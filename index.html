<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Events</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header">
        <h1>Events</h1>
        <p>Create and manage festival events. Set one as active to start tracking.</p>
      </div>
      <div class="page-body">
        <!-- Create event -->
        <div class="card mb-6">
          <div class="card-title"><i data-lucide="plus-circle"></i> New Event</div>
          <form id="createForm" class="form-row" style="align-items:flex-end; gap:10px;">
            <div class="form-group" style="flex:2; margin-bottom:0;">
              <label>Event Name</label>
              <input type="text" id="eventName" placeholder="e.g. Summer Festival 2025" required>
            </div>
            <div class="form-group" style="flex:1; margin-bottom:0;">
              <label>Date</label>
              <input type="date" id="eventDate" required>
            </div>
            <button type="submit" class="btn btn-primary">
              <i data-lucide="plus"></i> Create
            </button>
          </form>
        </div>

        <!-- Event list -->
        <div id="eventList"></div>
      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/db.js"></script>
  <script>
    renderNav('events');

    const $list = document.getElementById('eventList');
    const $form = document.getElementById('createForm');

    async function loadEvents() {
      const events = await DB.getEvents();
      if (!events.length) {
        $list.innerHTML = `<div class="empty-state"><i data-lucide="calendar"></i><h3>No events yet</h3><p>Create your first event above to get started.</p></div>`;
        lucide.createIcons();
        return;
      }

      $list.innerHTML = events.map(e => {
        const badgeClass = e.status === 'active' ? 'badge-green' : e.status === 'closed' ? 'badge-gray' : 'badge-purple';
        const statusLabel = e.status.charAt(0).toUpperCase() + e.status.slice(1);

        let actions = '';
        if (e.status === 'active') {
          actions += `<button class="btn btn-sm btn-ghost" onclick="deactivate('${e.id}')"><i data-lucide="pause"></i> Deactivate</button>`;
        } else {
          actions += `<button class="btn btn-sm btn-success" onclick="activate('${e.id}','${esc(e.name)}')"><i data-lucide="play"></i> Activate</button>`;
        }
        actions += `<button class="btn btn-sm btn-danger" onclick="del('${e.id}')"><i data-lucide="trash-2"></i></button>`;

        return `
          <div class="event-card">
            <div class="event-info">
              <div class="event-name">${esc(e.name)}</div>
              <div class="event-date">${e.date || 'No date'} &nbsp;<span class="badge ${badgeClass}">${statusLabel}</span></div>
            </div>
            <div class="event-actions">${actions}</div>
          </div>`;
      }).join('');
      lucide.createIcons();
    }

    $form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const name = document.getElementById('eventName').value.trim();
      const date = document.getElementById('eventDate').value;
      if (!name) return;
      const btn = $form.querySelector('button[type="submit"]');
      btn.disabled = true;
      const { error } = await DB.createEvent(name, date);
      btn.disabled = false;
      if (error) { toast(error.message, 'err'); return; }
      toast('Event created');
      $form.reset();
      loadEvents();
    });

    async function activate(id, name) {
      // Deactivate any currently active event first
      const events = await DB.getEvents();
      for (const e of events) {
        if (e.status === 'active' && e.id !== id) {
          await DB.updateEventStatus(e.id, 'closed');
        }
      }
      await DB.updateEventStatus(id, 'active');
      Ctx.set(id, name, 'active');
      toast('Event activated');
      renderNav('events');
      loadEvents();
    }

    async function deactivate(id) {
      await DB.updateEventStatus(id, 'closed');
      if (Ctx.id() === id) Ctx.clear();
      toast('Event deactivated');
      renderNav('events');
      loadEvents();
    }

    async function del(id) {
      if (!confirm('Delete this event and all its data?')) return;
      const { error } = await DB.deleteEvent(id);
      if (error) { toast(error.message, 'err'); return; }
      if (Ctx.id() === id) Ctx.clear();
      toast('Event deleted');
      renderNav('events');
      loadEvents();
    }

    loadEvents();
  </script>
</body>
</html>
