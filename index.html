<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>StockFest — Runner</title>
  <link rel="stylesheet" href="/css/style.css">

</head>
<body>
<div id="toast" class="hidden"></div>
<div class="runner-wrap">

  <!-- Header -->
  <div class="runner-header">
    <div class="runner-logo">
      <div class="runner-logo-icon">
        <i data-lucide="beer" style="color:white;width:16px;height:16px"></i>
      </div>
      <div>
        <div class="runner-event" id="event-name">—</div>
        <div style="font-size:11px;color:var(--text3)" id="runner-name">—</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="Auth.signOut()">
      <i data-lucide="log-out"></i>
    </button>
  </div>

  <div class="runner-body">

    <!-- Step 1: Movement type -->
    <div id="step-type">
      <p class="runner-section-title">Wat wil je registreren?</p>
      <div class="type-card" id="card-transfer" onclick="selectType('transfer')">
        <div class="type-icon" style="background:rgba(139,92,246,.15)">
          <i data-lucide="arrow-left-right" style="color:#a78bfa"></i>
        </div>
        <div>
          <div style="font-weight:700;color:#f1f5f9;font-size:15px">Transfer</div>
          <div style="font-size:12px;color:var(--text3)">Producten van locatie A naar B</div>
        </div>
      </div>
      <div class="type-card" id="card-delivery" onclick="selectType('delivery')">
        <div class="type-icon" style="background:rgba(16,185,129,.15)">
          <i data-lucide="truck" style="color:#34d399"></i>
        </div>
        <div>
          <div style="font-weight:700;color:#f1f5f9;font-size:15px">Levering</div>
          <div style="font-size:12px;color:var(--text3)">Nieuwe voorraad van buiten</div>
        </div>
      </div>
    </div>

    <!-- Step 2: Movement form -->
    <div id="step-form" style="display:none">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <button class="btn btn-ghost btn-sm" onclick="backToType()">
          <i data-lucide="arrow-left"></i>
        </button>
        <span id="form-type-label" style="font-weight:700;font-size:15px;color:#f1f5f9">—</span>
      </div>

      <div id="from-field" class="runner-field" style="display:none">
        <label>Van locatie</label>
        <select id="sel-from">
          <option value="">Selecteer locatie...</option>
        </select>
      </div>

      <div class="runner-field">
        <label>Naar locatie</label>
        <select id="sel-to">
          <option value="">Selecteer locatie...</option>
        </select>
      </div>

      <div class="runner-field">
        <label>Product</label>
        <select id="sel-sku">
          <option value="">Selecteer product...</option>
        </select>
      </div>

      <div class="runner-field">
        <label>Aantal</label>
        <div class="stepper">
          <button class="stepper-btn" style="width:48px;height:48px;font-size:22px" onclick="adjQty(-1)">−</button>
          <input id="inp-qty" type="number" min="1" value="1"
            style="width:100%;text-align:center;font-size:22px;font-weight:700;padding:10px 4px">
          <button class="stepper-btn" style="width:48px;height:48px;font-size:22px" onclick="adjQty(1)">+</button>
        </div>
      </div>

      <div class="runner-field">
        <label>Notities (optioneel)</label>
        <input id="inp-notes" type="text" placeholder="Opmerking...">
      </div>

      <button id="btn-submit" class="btn btn-success btn-full" style="padding:16px;font-size:16px;margin-top:8px">
        <i data-lucide="check-circle"></i> Opslaan
      </button>
    </div>

    <!-- Recent movements -->
    <div id="recent-section" style="margin-top:28px">
      <p class="runner-section-title">Jouw recente bewegingen</p>
      <div id="recent-list">
        <div style="color:var(--text3);font-size:13px">Laden...</div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/db.js"></script>
<script>
let _profile, _event, _locations = [], _skus = [], _lsMap = {};
let _selectedType = null;

document.addEventListener('DOMContentLoaded', async () => {
  _profile = await Auth.require();   // any authenticated user
  if (!_profile) return;

  // Load active event
  _event = await DB.getActiveEvent();
  if (!_event) {
    document.querySelector('.runner-wrap').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center">
        <div>
          <div style="font-size:48px;margin-bottom:12px">⚠️</div>
          <h2 style="color:#f1f5f9;margin-bottom:8px">Geen actief evenement</h2>
          <p style="color:var(--text3);font-size:14px">Vraag een admin een evenement te activeren.</p>
        </div>
      </div>`;
    return;
  }

  document.getElementById('event-name').textContent = _event.name;
  document.getElementById('runner-name').textContent = _profile.name || _profile.email || '';

  // Load data
  [_locations, _skus, _lsMap] = await Promise.all([
    DB.getLocations(_event.id),
    DB.getSkus(),
    DB.getLocationSkuMap(_event.id),
  ]);

  populateSelects();
  await loadRecent();

  document.getElementById('btn-submit').addEventListener('click', handleSubmit);
  lucide.createIcons();
});

function populateSelects() {
  const locOptions = _locations.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
  const skuOptions = _skus.map(s => `<option value="${s.id}">${esc(s.name)} (${esc(s.unit)})</option>`).join('');

  document.getElementById('sel-from').innerHTML = '<option value="">Selecteer locatie...</option>' + locOptions;
  document.getElementById('sel-to').innerHTML   = '<option value="">Selecteer locatie...</option>' + locOptions;
  document.getElementById('sel-sku').innerHTML  = '<option value="">Selecteer product...</option>' + skuOptions;
}

function selectType(type) {
  _selectedType = type;
  document.getElementById('step-type').style.display = 'none';
  document.getElementById('step-form').style.display = '';
  document.getElementById('form-type-label').textContent = type === 'transfer' ? 'Transfer' : 'Levering';
  document.getElementById('from-field').style.display = type === 'transfer' ? '' : 'none';
  document.getElementById('inp-qty').value = 1;
  document.getElementById('inp-notes').value = '';
  document.getElementById('sel-from').value = '';
  document.getElementById('sel-to').value   = '';
  document.getElementById('sel-sku').value  = '';
  lucide.createIcons();
}

function backToType() {
  _selectedType = null;
  document.getElementById('step-form').style.display = 'none';
  document.getElementById('step-type').style.display = '';
}

function adjQty(delta) {
  const inp = document.getElementById('inp-qty');
  inp.value = Math.max(1, (parseInt(inp.value) || 1) + delta);
}

async function handleSubmit() {
  const fromId = document.getElementById('sel-from').value;
  const toId   = document.getElementById('sel-to').value;
  const skuId  = document.getElementById('sel-sku').value;
  const qty    = parseInt(document.getElementById('inp-qty').value) || 0;
  const notes  = document.getElementById('inp-notes').value.trim();

  if (_selectedType === 'transfer' && !fromId) { showToast('Selecteer een vertreklocatie.', 'error'); return; }
  if (!toId)   { showToast('Selecteer een bestemmingslocatie.', 'error'); return; }
  if (!skuId)  { showToast('Selecteer een product.', 'error'); return; }
  if (qty < 1) { showToast('Voer een geldig aantal in.', 'error'); return; }
  if (_selectedType === 'transfer' && fromId === toId) { showToast('Van en naar locatie mogen niet hetzelfde zijn.', 'error'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Opslaan...';

  const { error } = await DB.createMovement({
    eventId:         _event.id,
    fromLocationId:  _selectedType === 'transfer' ? fromId : null,
    toLocationId:    toId,
    skuId,
    quantity:        qty,
    type:            _selectedType,
    notes,
  });

  btn.disabled = false;
  btn.innerHTML = '<i data-lucide="check-circle"></i> Opslaan';
  lucide.createIcons();

  if (error) { showToast('Fout: ' + error.message, 'error'); return; }
  showToast('Opgeslagen!', 'ok');
  backToType();
  await loadRecent();
}

async function loadRecent() {
  const movements = await DB.getMyMovements(_event.id, 10);
  const el = document.getElementById('recent-list');

  if (!movements.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px">Nog geen bewegingen.</div>';
    return;
  }

  el.innerHTML = movements.map(m => {
    const isTransfer = m.type === 'transfer';
    const from = m.from_loc?.name || 'Extern';
    const to   = m.to_loc?.name   || '—';
    const when = new Date(m.moved_at).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
    return `<div class="feed-item">
      <div class="feed-dot ${m.type}"></div>
      <div class="feed-main">
        <div class="feed-title">${isTransfer ? `${esc(from)} → ${esc(to)}` : `Levering → ${esc(to)}`}</div>
        <div class="feed-meta">${esc(m.sku?.name || '—')} · ${when}</div>
      </div>
      <div class="feed-qty">${m.quantity} ${esc(m.sku?.unit || '')}</div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s).replace(/['"<>&]/g, c => ({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
</script>
</body>
</html>
