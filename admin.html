<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beheer — Festival Voorraadbeheer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════
       Unified dark theme — overrides Tailwind colors
    ═══════════════════════════════════════════════ */
    body { background: #080d1a !important; color: #e2e8f0 !important; }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(59,130,246,.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(139,92,246,.04) 0%, transparent 60%);
    }
    #main-section { position: relative; z-index: 1; }

    /* Nav */
    .bg-gray-900 { background: rgba(8,13,26,.97) !important; }
    nav          { border-bottom: 1px solid rgba(255,255,255,.06) !important; }

    /* Cards */
    .bg-white    { background: rgba(18,24,40,.97) !important; }
    .bg-gray-100 { background: #080d1a !important; }
    .bg-gray-50  { background: rgba(255,255,255,.02) !important; }
    .shadow-sm   { box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 4px 18px rgba(0,0,0,.45) !important; }

    /* Borders */
    .border-gray-200          { border-color: rgba(255,255,255,.08) !important; }
    .border-gray-100          { border-color: rgba(255,255,255,.04) !important; }
    div.border-b,
    .border-b.border-gray-200 { border-bottom-color: rgba(255,255,255,.06) !important; }

    /* Text */
    h2, h3, .text-gray-800 { color: #f1f5f9 !important; }
    .text-gray-700          { color: #e2e8f0 !important; }
    label                   { color: #94a3b8 !important; }
    .text-gray-600          { color: #94a3b8 !important; }
    .text-gray-500          { color: #64748b !important; }
    .text-gray-400          { color: #475569 !important; }
    span.font-medium        { color: #e2e8f0 !important; }
    td                      { color: #cbd5e1 !important; }
    th                      { color: #475569 !important; }
    .border-b.border-gray-100 td { border-bottom-color: rgba(255,255,255,.04) !important; }

    /* Form elements */
    input[type="text"],
    input[type="date"],
    input[type="number"],
    select {
      background: rgba(255,255,255,.06) !important;
      color: #e2e8f0 !important;
      border-color: rgba(255,255,255,.1) !important;
    }
    input::placeholder         { color: #475569 !important; }
    input[type="checkbox"]     { accent-color: #3b82f6; }
    select option              { background: #1e293b; }
    .focus\:border-blue-400:focus {
      border-color: rgba(59,130,246,.6) !important;
      box-shadow: 0 0 0 3px rgba(59,130,246,.08) !important;
    }

    /* Tab bar */
    .bg-white.border-b {
      background: rgba(8,13,26,.96) !important;
      border-bottom-color: rgba(255,255,255,.06) !important;
    }
    .tab-active { background: #3b82f6 !important; color: white !important; }

    /* Hover */
    .hover\:bg-gray-100:hover,
    .hover\:bg-gray-50:hover  { background: rgba(255,255,255,.05) !important; }
    .hover\:bg-gray-300:hover { background: rgba(255,255,255,.11) !important; }

    /* Active event highlight */
    .border-blue-400 { border-color: rgba(59,130,246,.5) !important; }
    .bg-blue-50      { background: rgba(59,130,246,.07) !important; }

    /* Buttons */
    .bg-blue-600               { background: #3b82f6 !important; }
    .hover\:bg-blue-700:hover  { background: #2563eb !important; }
    .bg-green-600              { background: rgba(16,185,129,.85) !important; color: white !important; }
    .hover\:bg-green-700:hover { background: rgba(5,150,105,.85) !important; }
    .bg-gray-200               { background: rgba(255,255,255,.09) !important; color: #94a3b8 !important; }
    .bg-red-100                { background: rgba(239,68,68,.12) !important; }
    .text-red-700              { color: #f87171 !important; }
    .hover\:bg-red-200:hover   { background: rgba(239,68,68,.22) !important; }

    /* Info / tip box */
    .text-blue-700 { color: #93c5fd !important; }

    /* Active badge */
    span.bg-blue-600 { background: rgba(59,130,246,.85) !important; }

    /* Beer amber */
    .text-amber-700 { color: #fbbf24 !important; }

    /* Lucide icon alignment */
    [data-lucide],
    i[data-lucide] { display: inline-flex; align-items: center; vertical-align: middle; }
  </style>
</head>
<body class="min-h-screen font-sans">

<div id="main-section">
  <nav class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between sticky top-0 z-50 backdrop-blur-md">
    <div class="flex items-center gap-3">
      <div style="width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);
                  border-radius:9px;display:flex;align-items:center;justify-content:center;
                  box-shadow:0 0 14px rgba(59,130,246,.35)">
        <i data-lucide="beer" style="width:18px;height:18px;color:white"></i>
      </div>
      <span class="font-semibold">Beheer</span>
      <span class="text-gray-400 text-sm">
        — Actief evenement: <strong id="active-event-name" class="text-gray-200">—</strong>
      </span>
    </div>
    <a href="/dashboard" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
      <i data-lucide="layout-grid" style="width:14px;height:14px"></i> Dashboard
    </a>
  </nav>

  <!-- Tabs -->
  <div class="bg-white border-b border-gray-200 px-6">
    <div class="flex gap-1 py-2">
      <button id="tab-btn-events" onclick="showTab('events')"
        class="tab-active flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
        <i data-lucide="calendar" style="width:14px;height:14px"></i> Evenementen
      </button>
      <button id="tab-btn-bars" onclick="showTab('bars')"
        class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors">
        <i data-lucide="store" style="width:14px;height:14px"></i> Bars
      </button>
      <button id="tab-btn-skus" onclick="showTab('skus')"
        class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors">
        <i data-lucide="package" style="width:14px;height:14px"></i> Producten
      </button>
    </div>
  </div>

  <div class="max-w-4xl mx-auto p-6 space-y-6">

    <!-- Events tab -->
    <div id="tab-events">
      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Nieuw evenement</h2>
          <form id="event-form" class="space-y-3">
            <input id="event-name" type="text" placeholder="Naam (bijv. Koningsdag Dordrecht 2025)"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <input id="event-date" type="date"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input id="event-use-defaults" type="checkbox" checked class="rounded">
              Standaard productenlijst toevoegen (Jupiler, Coca Cola, etc.)
            </label>
            <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl text-sm transition-colors">
              Evenement aanmaken
            </button>
          </form>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Evenementen</h2>
          <div id="event-list" class="space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- Bars tab -->
    <div id="tab-bars" class="hidden">
      <div class="grid md:grid-cols-3 gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Bar toevoegen</h2>
          <form id="bar-form" class="space-y-3">
            <input id="bar-name" type="text" placeholder="Naam (bijv. Bar 1)"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl text-sm transition-colors">
              Toevoegen
            </button>
          </form>
          <div class="mt-4 p-3 bg-blue-50 rounded-xl text-xs text-blue-700">
            <strong>Tip:</strong> Voeg alle bars toe en vink daarna per bar aan welke producten er beschikbaar zijn.
            Gebruik "Alles ✓" om alle producten in één klik toe te wijzen.
          </div>
        </div>
        <div class="md:col-span-2 space-y-4" id="bar-list"></div>
      </div>
    </div>

    <!-- SKUs tab -->
    <div id="tab-skus" class="hidden">
      <div class="grid md:grid-cols-3 gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Product toevoegen</h2>
          <form id="sku-form" class="space-y-3">
            <input id="sku-name" type="text" placeholder="Productnaam"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <input id="sku-unit" type="text" placeholder="Eenheid (stuks / liter / ...)"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none">
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input id="sku-is-beer" type="checkbox" class="rounded"
                onchange="document.getElementById('sku-tank-size').classList.toggle('hidden',!this.checked)">
              Dit is een biertank
            </label>
            <input id="sku-tank-size" type="number" placeholder="Tankinhoud in liters (bijv. 1000)"
              value="1000"
              class="hidden w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none">
            <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl text-sm transition-colors">
              Toevoegen
            </button>
          </form>
        </div>
        <div class="md:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Producten</h2>
          <div id="sku-list"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
