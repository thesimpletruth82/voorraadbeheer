<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beheer — Festival Voorraadbeheer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-active { background-color: #2563eb; color: white; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

<div id="main-section">
  <nav class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-xl">⚙️</span>
      <span class="font-semibold">Beheer</span>
      <span class="text-gray-400 text-sm">— Actief evenement: <strong id="active-event-name">—</strong></span>
    </div>
    <a href="/dashboard" class="text-sm text-gray-400 hover:text-white">Dashboard →</a>
  </nav>

  <!-- Tabs -->
  <div class="bg-white border-b border-gray-200 px-6">
    <div class="flex gap-1 py-2">
      <button id="tab-btn-events" onclick="showTab('events')"
        class="tab-active px-4 py-2 rounded-lg text-sm font-medium transition-colors">Evenementen</button>
      <button id="tab-btn-bars" onclick="showTab('bars')"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors">Bars</button>
      <button id="tab-btn-skus" onclick="showTab('skus')"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors">Producten</button>
    </div>
  </div>

  <div class="max-w-4xl mx-auto p-6 space-y-6">

    <!-- Events tab -->
    <div id="tab-events">
      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Nieuw evenement</h2>
          <form id="event-form" class="space-y-3">
            <input id="event-name" type="text" placeholder="Naam (bijv. Koningsdag Dordrecht 2025)"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <input id="event-date" type="date"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input id="event-use-defaults" type="checkbox" checked class="rounded">
              Standaard productenlijst toevoegen (Jupiler, Coca Cola, etc.)
            </label>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl text-sm transition-colors">
              Evenement aanmaken
            </button>
          </form>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Evenementen</h2>
          <div id="event-list" class="space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- Bars tab -->
    <div id="tab-bars" class="hidden">
      <div class="grid md:grid-cols-3 gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Bar toevoegen</h2>
          <form id="bar-form" class="space-y-3">
            <input id="bar-name" type="text" placeholder="Naam (bijv. Bar 1)"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl text-sm transition-colors">
              Toevoegen
            </button>
          </form>
          <div class="mt-4 p-3 bg-blue-50 rounded-xl text-xs text-blue-700">
            <strong>Tip:</strong> Voeg alle bars toe en vink daarna per bar aan welke producten er beschikbaar zijn. Gebruik "Alles ✓" om alle producten in één klik toe te wijzen.
          </div>
        </div>
        <div class="md:col-span-2 space-y-4" id="bar-list"></div>
      </div>
    </div>

    <!-- SKUs tab -->
    <div id="tab-skus" class="hidden">
      <div class="grid md:grid-cols-3 gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Product toevoegen</h2>
          <form id="sku-form" class="space-y-3">
            <input id="sku-name" type="text" placeholder="Productnaam"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none" required>
            <input id="sku-unit" type="text" placeholder="Eenheid (stuks / liter / ...)"
              class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none">
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input id="sku-is-beer" type="checkbox" class="rounded" onchange="document.getElementById('sku-tank-size').classList.toggle('hidden',!this.checked)">
              Dit is een biertank
            </label>
            <input id="sku-tank-size" type="number" placeholder="Tankinhoud in liters (bijv. 1000)"
              value="1000" class="hidden w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 focus:outline-none">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl text-sm transition-colors">
              Toevoegen
            </button>
          </form>
        </div>
        <div class="md:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="font-semibold text-gray-800 mb-4">Producten</h2>
          <div id="sku-list"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
