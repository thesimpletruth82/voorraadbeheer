<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Overzicht — StockFest</title>
  <link rel="stylesheet" href="/css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="toast" class="hidden"></div>
<div class="admin-layout">
  <aside class="sidebar" id="admin-sidebar"></aside>
  <main class="main-content">
    <div class="page-header flex items-center justify-between">
      <div>
        <h1 style="display:flex;align-items:center;gap:10px">
          Live Overzicht <span class="live-dot"></span>
        </h1>
        <p>Bijgewerkt: <span id="last-updated">—</span> &nbsp;·&nbsp; vernieuwt elke 30 sec</p>
      </div>
      <button class="btn btn-ghost" onclick="loadAll()">
        <i data-lucide="refresh-cw"></i> Vernieuwen
      </button>
    </div>
    <div class="page-body">
      <div class="stats-row" id="stat-cards"></div>
      <div id="stock-tables"></div>
      <div class="grid-2" style="margin-top:24px">
        <div class="card">
          <div class="card-title"><i data-lucide="activity"></i> Recente bewegingen</div>
          <div id="movement-feed"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Voorraad per locatie (totaal)</div>
          <canvas id="overview-chart"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/db.js"></script>
<script src="/js/admin-nav.js"></script>
<script>
let _profile, _locations = [], _skus = [], _lsMap = {}, _stock = {}, _movements = [];
let _chart = null, _refreshTimer = null;
const eventId = Auth.getEventId();

document.addEventListener('DOMContentLoaded', async () => {
  _profile = await Auth.require('admin');
  if (!_profile) return;
  renderAdminNav('overview', _profile);
  if (!eventId) { showNoEvent(); lucide.createIcons(); return; }
  await loadAll();
  startAutoRefresh();
  subscribeRealtime();
  lucide.createIcons();
});

async function loadAll() {
  [_locations, _skus, _lsMap, _movements] = await Promise.all([
    DB.getLocations(eventId),
    DB.getSkus(),
    DB.getLocationSkuMap(eventId),
    DB.getMovements(eventId, 30),
  ]);
  _stock = await DB.computeCurrentStock(eventId);
  document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('nl-NL');
  renderStats();
  renderStockTables();
  renderFeed();
  renderChart();
  lucide.createIcons();
}

// ── Stat cards ───────────────────────────────────────────────
function renderStats() {
  const totalMovements = _movements.length;
  let lowCount = 0;

  _locations.forEach(loc => {
    const locSkuIds = _lsMap[loc.id] || new Set();
    _skus.filter(s => locSkuIds.has(s.id)).forEach(sku => {
      const qty = _stock[loc.id]?.[sku.id] || 0;
      if (qty < 10 && qty >= 0) lowCount++;
    });
  });

  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(59,130,246,.15)"><i data-lucide="map-pin" style="color:#3b82f6;width:16px;height:16px"></i></div>
      <div class="stat-label">Locaties</div>
      <div class="stat-value">${_locations.length}</div>
      <div class="stat-sub">${Auth.getEventName()}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(139,92,246,.15)"><i data-lucide="package" style="color:#8b5cf6;width:16px;height:16px"></i></div>
      <div class="stat-label">Producten</div>
      <div class="stat-value">${_skus.length}</div>
      <div class="stat-sub">in catalogus</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(16,185,129,.15)"><i data-lucide="activity" style="color:#10b981;width:16px;height:16px"></i></div>
      <div class="stat-label">Bewegingen</div>
      <div class="stat-value">${totalMovements}</div>
      <div class="stat-sub">vandaag gelogd</div>
    </div>
    <div class="stat-card" style="${lowCount > 0 ? 'border-color:rgba(245,158,11,.3)' : ''}">
      <div class="stat-icon" style="background:rgba(245,158,11,.15)"><i data-lucide="alert-triangle" style="color:#f59e0b;width:16px;height:16px"></i></div>
      <div class="stat-label">Laag voorraad</div>
      <div class="stat-value" style="color:${lowCount > 0 ? '#f59e0b' : '#10b981'}">${lowCount}</div>
      <div class="stat-sub">onder 10 stuks</div>
    </div>`;
  lucide.createIcons();
}

// ── Stock tables ─────────────────────────────────────────────
function renderStockTables() {
  const el = document.getElementById('stock-tables');
  if (!_locations.length) { el.innerHTML = ''; return; }

  el.innerHTML = _locations.map(loc => {
    const locSkuIds = _lsMap[loc.id] || new Set();
    const skus = _skus.filter(s => locSkuIds.has(s.id));
    if (!skus.length) return '';

    const rows = skus.map(sku => {
      const qty = _stock[loc.id]?.[sku.id] ?? 0;
      const cls = qty < 0 ? 'row-crit' : qty < 10 ? 'row-warn' : qty < 30 ? '' : 'row-ok';
      const badge = qty < 0
        ? '<span class="badge badge-red">Negatief</span>'
        : qty < 10
        ? '<span class="badge badge-amber">Laag</span>'
        : '';
      return `<tr class="${cls}">
        <td><strong>${esc(sku.name)}</strong></td>
        <td class="right" style="font-size:18px;font-weight:700;color:#f1f5f9">${qty}</td>
        <td class="right">${esc(sku.unit)}</td>
        <td class="right">${badge}</td>
      </tr>`;
    }).join('');

    return `<div class="card" style="margin-bottom:16px">
      <div class="card-title"><i data-lucide="map-pin"></i> ${esc(loc.name)}</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Product</th><th class="right">Voorraad</th><th class="right">Eenheid</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

// ── Movement feed ────────────────────────────────────────────
function renderFeed() {
  const el = document.getElementById('movement-feed');
  if (!_movements.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0">Nog geen bewegingen.</div>';
    return;
  }
  el.innerHTML = _movements.map(m => {
    const isTransfer = m.type === 'transfer';
    const from = m.from_loc?.name || 'Extern';
    const to   = m.to_loc?.name   || '—';
    const who  = m.runner?.name || m.runner?.email || 'Onbekend';
    const when = new Date(m.moved_at).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
    return `<div class="feed-item">
      <div class="feed-dot ${m.type}"></div>
      <div class="feed-main">
        <div class="feed-title">${isTransfer ? `${esc(from)} → ${esc(to)}` : `Levering → ${esc(to)}`}</div>
        <div class="feed-meta">${esc(m.sku?.name || '—')} · ${who} · ${when}</div>
      </div>
      <div class="feed-qty">${m.quantity} ${esc(m.sku?.unit || '')}</div>
    </div>`;
  }).join('');
}

// ── Chart ────────────────────────────────────────────────────
function renderChart() {
  const canvas = document.getElementById('overview-chart');
  if (!canvas) return;
  if (_chart) { _chart.destroy(); _chart = null; }
  if (!_locations.length) return;

  // Sum total stock per location (non-negative)
  const labels = _locations.map(l => l.name);
  const data   = _locations.map(loc => {
    const locSkuIds = _lsMap[loc.id] || new Set();
    return _skus
      .filter(s => locSkuIds.has(s.id))
      .reduce((sum, sku) => sum + Math.max(0, _stock[loc.id]?.[sku.id] || 0), 0);
  });

  _chart = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Totale voorraad (stuks)', data,
        backgroundColor: 'rgba(59,130,246,.7)', borderColor: 'rgba(59,130,246,1)',
        borderWidth: 1, borderRadius: 4 }],
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
        tooltip: { backgroundColor: 'rgba(15,23,42,.95)', titleColor:'#f1f5f9', bodyColor:'#94a3b8' } },
      scales: {
        x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,.04)' } },
        y: { beginAtZero: true, ticks: { color: '#64748b', precision: 0 }, grid: { color: 'rgba(255,255,255,.06)' } },
      },
    },
  });
}

function startAutoRefresh() {
  if (_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer = setInterval(loadAll, 30000);
}

function subscribeRealtime() {
  getSB().channel('sf-live')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'movements',
      filter: `event_id=eq.${eventId}` }, () => loadAll())
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'stock_counts',
      filter: `event_id=eq.${eventId}` }, () => loadAll())
    .subscribe();
}

function showNoEvent() {
  document.querySelector('.page-body').innerHTML = `<div class="card" style="text-align:center;padding:40px">
    <p>Selecteer eerst een evenement via <a href="/admin">Evenementen</a>.</p></div>`;
}

function esc(s) { return String(s).replace(/['"<>&]/g, c => ({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
</script>
</body>
</html>
