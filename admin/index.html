<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evenementen — StockFest</title>
  <link rel="stylesheet" href="/css/style.css">

</head>
<body>
<div id="toast" class="hidden"></div>
<div class="admin-layout">
  <aside class="sidebar" id="admin-sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>Evenementen</h1>
      <p>Maak evenementen aan en beheer hun status.</p>
    </div>
    <div class="page-body">
      <div class="grid-2">
        <!-- Create form -->
        <div class="card">
          <div class="card-title"><i data-lucide="plus-circle"></i> Nieuw evenement</div>
          <div class="form-group">
            <label>Naam</label>
            <input id="ev-name" type="text" placeholder="bijv. Koningsdag Dordrecht 2026">
          </div>
          <div class="form-group">
            <label>Datum</label>
            <input id="ev-date" type="date">
          </div>
          <button id="btn-create-event" class="btn btn-primary btn-full">
            <i data-lucide="plus"></i> Aanmaken
          </button>
        </div>

        <!-- Event list -->
        <div class="card">
          <div class="card-title"><i data-lucide="calendar"></i> Alle evenementen</div>
          <div id="event-list"><div class="empty-state"><i data-lucide="calendar"></i><br>Geen evenementen</div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/db.js"></script>
<script src="/js/admin-nav.js"></script>
<script>
let _profile = null;

document.addEventListener('DOMContentLoaded', async () => {
  _profile = await Auth.require();
  if (!_profile) return;
  renderAdminNav('events', _profile);
  await loadEvents();

  document.getElementById('btn-create-event').addEventListener('click', handleCreate);
  document.getElementById('ev-name').addEventListener('keydown', e => e.key === 'Enter' && handleCreate());
  lucide.createIcons();
});

async function loadEvents() {
  const events = await DB.getEvents();
  const el = document.getElementById('event-list');

  if (!events.length) {
    el.innerHTML = '<div class="empty-state" style="padding:24px 0"><p>Nog geen evenementen. Maak er één aan.</p></div>';
    return;
  }

  el.innerHTML = events.map(ev => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-weight:600;color:#f1f5f9;font-size:14px">${esc(ev.name)}</span>
          <span class="badge badge-${statusBadge(ev.status)}">${ev.status}</span>
          ${Auth.getEventId() === ev.id ? '<span class="badge badge-blue">Actief venster</span>' : ''}
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${formatDate(ev.date)}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;margin-left:12px">
        <button class="btn btn-ghost btn-sm" onclick="selectEvent('${ev.id}','${esc(ev.name)}','${ev.status}')" title="Werken met dit evenement">
          <i data-lucide="edit-2"></i>
        </button>
        ${statusActions(ev)}
        <button class="btn btn-danger btn-sm" onclick="handleDelete('${ev.id}')" title="Verwijderen">
          <i data-lucide="trash-2"></i>
        </button>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function statusBadge(s) {
  return s === 'active' ? 'green' : s === 'closed' ? 'gray' : 'amber';
}

function statusActions(ev) {
  if (ev.status === 'setup') {
    return `<button class="btn btn-success btn-sm" onclick="handleStatus('${ev.id}','active')"><i data-lucide="zap"></i> Activeer</button>`;
  }
  if (ev.status === 'active') {
    return `<button class="btn btn-ghost btn-sm" onclick="handleStatus('${ev.id}','closed')"><i data-lucide="flag"></i> Afsluiten</button>`;
  }
  return '';
}

function selectEvent(id, name, status) {
  Auth.setEvent(id, name, status);
  renderAdminNav('events', _profile);
  loadEvents();
  showToast(`Evenement: ${name}`, 'ok');
}

async function handleCreate() {
  const name = document.getElementById('ev-name').value.trim();
  const date = document.getElementById('ev-date').value;
  if (!name || !date) { showToast('Vul naam en datum in.', 'error'); return; }

  const btn = document.getElementById('btn-create-event');
  btn.disabled = true;
  const { data, error } = await DB.createEvent(name, date);
  btn.disabled = false;

  if (error) { showToast('Fout: ' + error.message, 'error'); return; }
  document.getElementById('ev-name').value = '';
  document.getElementById('ev-date').value = '';
  showToast('Evenement aangemaakt!', 'ok');
  selectEvent(data.id, data.name, data.status);
  await loadEvents();
}

async function handleStatus(id, status) {
  const { error } = await DB.updateEventStatus(id, status);
  if (error) { showToast('Fout: ' + error.message, 'error'); return; }
  // If we set this event as active, refresh our context
  const events = await DB.getEvents();
  const ev = events.find(e => e.id === id);
  if (ev && Auth.getEventId() === id) Auth.setEvent(id, ev.name, ev.status);
  showToast('Status bijgewerkt', 'ok');
  await loadEvents();
  renderAdminNav('events', _profile);
}

async function handleDelete(id) {
  if (!confirm('Dit evenement en alle bijbehorende data permanent verwijderen?')) return;
  const { error } = await DB.deleteEvent(id);
  if (error) { showToast('Fout: ' + error.message, 'error'); return; }
  if (Auth.getEventId() === id) Auth.clearEvent();
  showToast('Evenement verwijderd', 'ok');
  await loadEvents();
  renderAdminNav('events', _profile);
}

function esc(s) { return String(s).replace(/['"<>&]/g, c => ({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function formatDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('nl-NL', { day:'numeric', month:'long', year:'numeric' });
}
</script>
</body>
</html>
