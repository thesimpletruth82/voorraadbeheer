<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variantierapport — StockFest</title>
  <link rel="stylesheet" href="/css/style.css">

</head>
<body>
<div id="toast" class="hidden"></div>
<div class="admin-layout">
  <aside class="sidebar" id="admin-sidebar"></aside>
  <main class="main-content">
    <div class="page-header flex items-center justify-between">
      <div>
        <h1>Variantierapport</h1>
        <p>Verwacht vs. geteld eindvoorraad. Rijen met afwijking ≥ 5 zijn gemarkeerd.</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--text3)">Drempel:</label>
        <input id="threshold" type="number" value="5" min="0"
          style="width:64px;padding:6px 8px;font-size:13px"
          onchange="renderReport()">
        <button class="btn btn-ghost" onclick="loadAll()">
          <i data-lucide="refresh-cw"></i>
        </button>
      </div>
    </div>
    <div class="page-body">
      <div class="stats-row" id="summary-cards"></div>
      <div id="report-body"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/db.js"></script>
<script src="/js/admin-nav.js"></script>
<script>
let _locations = [], _skus = [], _lsMap = {}, _stock = {}, _closing = {};
const eventId = Auth.getEventId();

document.addEventListener('DOMContentLoaded', async () => {
  const profile = await Auth.require('admin');
  if (!profile) return;
  renderAdminNav('variance', profile);
  if (!eventId) { showNoEvent(); lucide.createIcons(); return; }
  await loadAll();
  lucide.createIcons();
});

async function loadAll() {
  [_locations, _skus, _lsMap, _stock, _closing] = await Promise.all([
    DB.getLocations(eventId),
    DB.getSkus(),
    DB.getLocationSkuMap(eventId),
    DB.computeCurrentStock(eventId),
    DB.getCountMap(eventId, 'closing'),
  ]);
  renderSummary();
  renderReport();
  lucide.createIcons();
}

function renderSummary() {
  const threshold = parseInt(document.getElementById('threshold').value) || 5;
  let totalRows = 0, flagged = 0, positive = 0, negative = 0;

  _locations.forEach(loc => {
    const locSkuIds = _lsMap[loc.id] || new Set();
    _skus.filter(s => locSkuIds.has(s.id)).forEach(sku => {
      const hasClosed = _closing[loc.id]?.[sku.id] != null;
      if (!hasClosed) return;
      totalRows++;
      const expected = _stock[loc.id]?.[sku.id] ?? 0;
      const actual   = _closing[loc.id][sku.id];
      const variance = actual - expected;
      if (Math.abs(variance) >= threshold) {
        flagged++;
        if (variance > 0) positive++;
        else negative++;
      }
    });
  });

  document.getElementById('summary-cards').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(59,130,246,.15)"><i data-lucide="clipboard-list" style="color:#3b82f6;width:16px;height:16px"></i></div>
      <div class="stat-label">Getelde regels</div>
      <div class="stat-value">${totalRows}</div>
      <div class="stat-sub">met eindtelling</div>
    </div>
    <div class="stat-card" style="${flagged > 0 ? 'border-color:rgba(239,68,68,.3)' : ''}">
      <div class="stat-icon" style="background:rgba(239,68,68,.15)"><i data-lucide="alert-triangle" style="color:#ef4444;width:16px;height:16px"></i></div>
      <div class="stat-label">Afwijkingen</div>
      <div class="stat-value" style="color:${flagged > 0 ? '#f87171' : '#10b981'}">${flagged}</div>
      <div class="stat-sub">≥ ${threshold} stuks verschil</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(16,185,129,.15)"><i data-lucide="trending-up" style="color:#10b981;width:16px;height:16px"></i></div>
      <div class="stat-label">Positief</div>
      <div class="stat-value" style="color:#34d399">${positive}</div>
      <div class="stat-sub">meer dan verwacht</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(239,68,68,.15)"><i data-lucide="trending-down" style="color:#ef4444;width:16px;height:16px"></i></div>
      <div class="stat-label">Negatief</div>
      <div class="stat-value" style="color:#f87171">${negative}</div>
      <div class="stat-sub">minder dan verwacht</div>
    </div>`;
  lucide.createIcons();
}

function renderReport() {
  const threshold = parseInt(document.getElementById('threshold').value) || 5;
  const el = document.getElementById('report-body');

  if (!_locations.length) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:40px">
      <p>Geen locaties gevonden.</p></div>`;
    return;
  }

  const hasAnyClosed = _locations.some(loc => {
    const ids = _lsMap[loc.id] || new Set();
    return _skus.some(s => ids.has(s.id) && _closing[loc.id]?.[s.id] != null);
  });

  if (!hasAnyClosed) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:40px">
      <i data-lucide="flag" style="width:36px;height:36px;color:var(--text4);display:block;margin:0 auto 12px"></i>
      <p style="color:var(--text3)">Nog geen eindtellingen ingevoerd.<br>
      Ga naar <a href="/admin/closing">Eindtelling</a> om te beginnen.</p></div>`;
    lucide.createIcons(); return;
  }

  el.innerHTML = _locations.map(loc => {
    const locSkuIds = _lsMap[loc.id] || new Set();
    const skus = _skus.filter(s => locSkuIds.has(s.id));
    const rows = skus.map(sku => {
      const expected = _stock[loc.id]?.[sku.id] ?? 0;
      const hasClosed = _closing[loc.id]?.[sku.id] != null;
      const actual    = hasClosed ? _closing[loc.id][sku.id] : null;
      const variance  = actual != null ? actual - expected : null;
      const absDelta  = variance != null ? Math.abs(variance) : 0;
      const rowClass  = variance == null ? '' : absDelta >= threshold * 2 ? 'var-crit' : absDelta >= threshold ? 'var-warn' : '';
      const varCell   = variance == null
        ? `<span style="color:var(--text4)">—</span>`
        : variance > 0
        ? `<span class="var-pos">+${variance} ${esc(sku.unit)}</span>`
        : variance < 0
        ? `<span class="var-neg">${variance} ${esc(sku.unit)}</span>`
        : `<span class="var-zero">0</span>`;

      return `<tr class="${rowClass}">
        <td><strong>${esc(sku.name)}</strong></td>
        <td class="right">${expected.toLocaleString('nl-NL')} <span style="color:var(--text4)">${esc(sku.unit)}</span></td>
        <td class="right">${actual != null ? actual.toLocaleString('nl-NL') + ' <span style="color:var(--text4)">' + esc(sku.unit) + '</span>' : '<span style="color:var(--text4)">niet geteld</span>'}</td>
        <td class="right">${varCell}</td>
      </tr>`;
    }).join('');

    if (!rows) return '';
    return `<div class="card" style="margin-bottom:16px">
      <div class="card-title"><i data-lucide="map-pin"></i> ${esc(loc.name)}</div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Product</th>
          <th class="right">Verwacht</th>
          <th class="right">Geteld</th>
          <th class="right">Verschil</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

function showNoEvent() {
  document.querySelector('.page-body').innerHTML = `<div class="card" style="text-align:center;padding:40px">
    <p>Selecteer eerst een evenement via <a href="/admin">Evenementen</a>.</p></div>`;
}

function esc(s) { return String(s).replace(/['"<>&]/g, c => ({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
</script>
</body>
</html>
