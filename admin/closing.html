<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eindtelling — StockFest</title>
  <link rel="stylesheet" href="/css/style.css">

</head>
<body>
<div id="toast" class="hidden"></div>
<div class="admin-layout">
  <aside class="sidebar" id="admin-sidebar"></aside>
  <main class="main-content">
    <div class="page-header flex items-center justify-between">
      <div>
        <h1>Eindtelling</h1>
        <p>Voer de slotvoorraad in per locatie. De variantierapport berekent daarna automatisch afwijkingen.</p>
      </div>
      <button id="btn-save-all" class="btn btn-success" style="flex-shrink:0">
        <i data-lucide="save"></i> Opslaan
      </button>
    </div>
    <div class="page-body">
      <div id="tab-bar" class="tab-bar"></div>
      <div id="count-form"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/db.js"></script>
<script src="/js/admin-nav.js"></script>
<script>
let _profile, _locations = [], _skus = [], _lsMap = {}, _counts = {}, _stock = {}, _activeLocIdx = 0;
const eventId = Auth.getEventId();

document.addEventListener('DOMContentLoaded', async () => {
  _profile = await Auth.require();
  if (!_profile) return;
  renderAdminNav('closing', _profile);
  if (!eventId) { showNoEvent(); lucide.createIcons(); return; }
  document.getElementById('btn-save-all').addEventListener('click', saveAll);
  await loadAll();
  lucide.createIcons();
});

async function loadAll() {
  [_locations, _skus, _lsMap, _counts, _stock] = await Promise.all([
    DB.getLocations(eventId),
    DB.getSkus(),
    DB.getLocationSkuMap(eventId),
    DB.getCountMap(eventId, 'closing'),
    DB.computeCurrentStock(eventId),
  ]);
  renderTabs();
  renderForm();
}

function renderTabs() {
  const el = document.getElementById('tab-bar');
  if (!_locations.length) { el.innerHTML = ''; return; }
  el.innerHTML = _locations.map((loc, i) => `
    <button class="tab-btn ${i === _activeLocIdx ? 'active' : ''}" onclick="switchTab(${i})">
      ${esc(loc.name)}
    </button>`).join('');
}

function switchTab(i) { _activeLocIdx = i; renderTabs(); renderForm(); }

function renderForm() {
  const el = document.getElementById('count-form');
  if (!_locations.length) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:40px">
      <p>Geen locaties. <a href="/admin/locations">Voeg locaties toe</a>.</p></div>`;
    return;
  }
  const loc = _locations[_activeLocIdx];
  const locSkuIds = _lsMap[loc.id] || new Set();
  const skus = _skus.filter(s => locSkuIds.has(s.id));

  if (!skus.length) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:32px">
      <p style="color:var(--text3)">Geen producten voor <strong>${esc(loc.name)}</strong>.</p></div>`;
    return;
  }

  el.innerHTML = `<div class="card">
    <div class="card-title"><i data-lucide="flag"></i> ${esc(loc.name)}</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Product</th>
          <th class="right">Verwacht</th>
          <th class="right">Geteld</th>
        </tr></thead>
        <tbody>
          ${skus.map(sku => {
            const expected = Math.max(0, _stock[loc.id]?.[sku.id] ?? 0);
            const saved    = _counts[loc.id]?.[sku.id] ?? '';
            return `<tr>
              <td>
                <strong>${esc(sku.name)}</strong>
                <span style="color:var(--text4);font-size:11px;margin-left:6px">${esc(sku.unit)}</span>
              </td>
              <td class="right" style="color:var(--text3)">${expected}</td>
              <td class="right">
                <div class="stepper" style="justify-content:flex-end">
                  <button class="stepper-btn" onclick="adj('${loc.id}','${sku.id}',-1)">−</button>
                  <input id="qty-${loc.id}-${sku.id}" type="number" min="0"
                    value="${saved}" placeholder="0" style="width:80px">
                  <button class="stepper-btn" onclick="adj('${loc.id}','${sku.id}',1)">+</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  lucide.createIcons();
}

function adj(locId, skuId, delta) {
  const inp = document.getElementById(`qty-${locId}-${skuId}`);
  inp.value = Math.max(0, (parseInt(inp.value) || 0) + delta);
}

async function saveAll() {
  if (!_locations.length) return;
  const loc = _locations[_activeLocIdx];
  const locSkuIds = _lsMap[loc.id] || new Set();
  const skus = _skus.filter(s => locSkuIds.has(s.id));

  const btn = document.getElementById('btn-save-all');
  btn.disabled = true; btn.textContent = 'Opslaan...';

  let errors = 0;
  for (const sku of skus) {
    const rawVal = document.getElementById(`qty-${loc.id}-${sku.id}`)?.value;
    if (rawVal === '' || rawVal === null) continue;
    const qty = parseFloat(rawVal) || 0;
    const { error } = await DB.saveCount(eventId, loc.id, sku.id, qty, 'closing', _profile.id);
    if (error) errors++;
  }

  btn.disabled = false;
  btn.innerHTML = '<i data-lucide="save"></i> Opslaan';
  lucide.createIcons();

  if (errors) { showToast(`${errors} fout(en) bij opslaan`, 'error'); return; }
  showToast(`${esc(loc.name)} eindtelling opgeslagen`, 'ok');
  _counts = await DB.getCountMap(eventId, 'closing');
  renderForm();
}

function showNoEvent() {
  document.querySelector('.page-body').innerHTML = `<div class="card" style="text-align:center;padding:40px">
    <p>Selecteer eerst een evenement via <a href="/admin">Evenementen</a>.</p></div>`;
}

function esc(s) { return String(s).replace(/['"<>&]/g, c => ({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
</script>
</body>
</html>
