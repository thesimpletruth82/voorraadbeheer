<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Festival Voorraadbeheer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }
    @keyframes fade-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    body {
      background: #080d1a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(59,130,246,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(139,92,246,.05) 0%, transparent 60%);
    }

    #dashboard-section { position: relative; z-index: 1; }

    /* ── Header ──────────────────────────────────────────── */
    .dash-header {
      background: rgba(8,13,26,.92);
      border-bottom: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
      padding: 14px 28px;
    }
    .dash-header-inner {
      max-width: 1600px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .dash-logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 0 16px rgba(59,130,246,.35);
    }
    .dash-event-name { font-size: 17px; font-weight: 700; color: #f1f5f9; }
    .dash-event-date { font-size: 12px; color: #64748b; margin-top: 2px; }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #10b981;
      display: inline-block; animation: pulse-dot 2s infinite;
      box-shadow: 0 0 6px rgba(16,185,129,.6);
    }
    .header-badge {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.09);
      color: #cbd5e1; padding: 6px 14px; border-radius: 8px;
      font-size: 12px; text-decoration: none; cursor: pointer;
      transition: background .15s;
    }
    .header-badge:hover { background: rgba(255,255,255,.11); }

    /* ── Stat cards ─────────────────────────────────────── */
    .stats-row {
      max-width: 1600px; margin: 0 auto;
      padding: 24px 28px 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .stat-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px;
      padding: 18px 20px;
      animation: fade-in .4s ease both;
    }
    .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 26px; font-weight: 700; color: #f1f5f9; margin: 6px 0 2px; }
    .stat-sub { font-size: 12px; color: #64748b; }
    .stat-icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; margin-bottom: 12px;
    }

    /* ── Legend ──────────────────────────────────────────── */
    .legend-bar {
      max-width: 1600px; margin: 0 auto;
      padding: 14px 28px;
      display: flex; align-items: center; gap: 18px;
      font-size: 12px; color: #475569;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 3px; display: inline-block;
    }

    /* ── Bars grid ───────────────────────────────────────── */
    .bars-grid {
      max-width: 1600px; margin: 0 auto;
      padding: 24px 28px;
      display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
    }

    /* ── Bar card ────────────────────────────────────────── */
    .bar-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      overflow: hidden;
      animation: fade-in .5s ease both;
    }
    .bar-card-header {
      padding: 14px 20px;
      background: rgba(255,255,255,.04);
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: 15px; font-weight: 600; color: #f1f5f9;
      display: flex; align-items: center; gap: 10px;
    }
    .bar-card-header-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #3b82f6;
      box-shadow: 0 0 6px rgba(59,130,246,.5);
    }

    /* ── Table ───────────────────────────────────────────── */
    .stock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stock-table thead tr {
      background: rgba(0,0,0,.25);
    }
    .stock-table thead th {
      padding: 9px 14px; text-align: right;
      font-size: 10px; font-weight: 600;
      color: #475569; text-transform: uppercase; letter-spacing: .06em;
    }
    .stock-table thead th:first-child { text-align: left; }
    .stock-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,.04);
      transition: background .15s;
    }
    .stock-table tbody tr:last-child { border-bottom: none; }
    .stock-table tbody tr:hover { background: rgba(255,255,255,.03) !important; }
    .stock-table td { padding: 10px 14px; text-align: right; }
    .stock-table td:first-child { text-align: left; font-weight: 500; color: #e2e8f0; }

    .row-green  { background: rgba(16,185,129,.07); }
    .row-yellow { background: rgba(245,158,11,.07); }
    .row-red    { background: rgba(239,68,68,.07); }

    /* ── Charts section ──────────────────────────────────── */
    .charts-section {
      max-width: 1600px; margin: 0 auto;
      padding: 0 28px 40px;
    }
    .charts-heading {
      padding: 20px 0 18px;
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: baseline; gap: 12px;
    }
    .charts-heading h2 {
      font-size: 13px; font-weight: 600;
      color: #94a3b8; text-transform: uppercase; letter-spacing: .07em;
    }
    .charts-heading p { font-size: 12px; color: #475569; }
    .charts-grid {
      display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    }
    .chart-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 20px 22px;
      animation: fade-in .5s ease both;
    }
    .chart-card-title {
      font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 16px;
    }
    .beer-divider {
      margin-top: 20px; padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .beer-divider-label {
      font-size: 11px; font-weight: 600; color: #f59e0b;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div id="dashboard-section">

  <!-- Header -->
  <div class="dash-header">
    <div class="dash-header-inner">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="dash-logo">🍺</div>
        <div>
          <div id="event-heading" class="dash-event-name">—</div>
          <div id="event-date" class="dash-event-date"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#64748b">
          <span class="live-dot"></span>
          <span>Bijgewerkt: <strong id="last-updated" style="color:#cbd5e1">—</strong></span>
        </div>
        <a href="/form" class="header-badge">📝 Formulier</a>
        <a href="/admin" class="header-badge">⚙️ Beheer</a>
      </div>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="stats-row" id="stat-cards"></div>

  <!-- Legend -->
  <div class="legend-bar">
    <span style="font-weight:600;color:#94a3b8">Status rij:</span>
    <span style="display:flex;align-items:center;gap:6px">
      <span class="legend-dot" style="background:rgba(16,185,129,.4);border:1px solid rgba(16,185,129,.5)"></span>&gt; 3 uur
    </span>
    <span style="display:flex;align-items:center;gap:6px">
      <span class="legend-dot" style="background:rgba(245,158,11,.4);border:1px solid rgba(245,158,11,.5)"></span>1–3 uur
    </span>
    <span style="display:flex;align-items:center;gap:6px">
      <span class="legend-dot" style="background:rgba(239,68,68,.4);border:1px solid rgba(239,68,68,.5)"></span>&lt; 1 uur
    </span>
    <span style="margin-left:auto;font-size:11px">30-min blokken · vernieuwd elke 30 sec</span>
  </div>

  <!-- Bars grid -->
  <div class="bars-grid" id="bars-container"></div>

  <!-- Charts section -->
  <div class="charts-section">
    <div class="charts-heading">
      <h2>📊 Verbruik per bar</h2>
      <p>Totaal beschikbaar vs. gebruikt</p>
    </div>
    <div class="charts-grid" id="charts-container"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
