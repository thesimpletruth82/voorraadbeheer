<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Festival Voorraadbeheer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
    .live-dot { animation: pulse-dot 2s infinite; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

<!-- Dashboard -->
<div id="dashboard-section">
  <!-- Header -->
  <div class="bg-gray-900 text-white px-6 py-4">
    <div class="max-w-screen-2xl mx-auto flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 id="event-heading" class="text-xl font-bold">—</h1>
        <p id="event-date" class="text-gray-400 text-sm"></p>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div class="flex items-center gap-2">
          <span class="live-dot w-2 h-2 rounded-full bg-green-400 inline-block"></span>
          <span class="text-gray-300">Live — bijgewerkt: <strong id="last-updated" class="text-white">—</strong></span>
        </div>
        <a href="/form" class="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded-lg text-xs transition-colors">📝 Formulier</a>
      </div>
    </div>
  </div>

  <!-- Legend -->
  <div class="bg-white border-b border-gray-200 px-6 py-2">
    <div class="max-w-screen-2xl mx-auto flex items-center gap-5 text-xs text-gray-500">
      <span class="font-medium text-gray-700">Status:</span>
      <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-green-100 border border-green-300 inline-block"></span> &gt; 3 uur</span>
      <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-yellow-100 border border-yellow-300 inline-block"></span> 1–3 uur</span>
      <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-100 border border-red-300 inline-block"></span> &lt; 1 uur</span>
      <span class="ml-auto text-gray-400">Verbruikssnelheid gebaseerd op 30-minuten blokken · Automatisch vernieuwd elke 30 sec</span>
    </div>
  </div>

  <!-- Bars grid -->
  <div id="bars-container" class="max-w-screen-2xl mx-auto p-6 grid gap-6"
    style="grid-template-columns: repeat(auto-fill, minmax(420px, 1fr))">
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
