<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Voorraad invoer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════
       Unified dark theme — overrides Tailwind colors
    ═══════════════════════════════════════════════ */
    body {
      background: #080d1a !important;
      color: #e2e8f0 !important;
      -webkit-tap-highlight-color: transparent;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(59,130,246,.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(139,92,246,.04) 0%, transparent 60%);
    }

    /* Step panels */
    .bg-gray-50,
    .bg-gray-100  { background: #080d1a !important; }
    .bg-white     { background: rgba(18,24,40,.98) !important; }
    .bg-gray-900  { background: rgba(8,13,26,.97) !important; }

    /* Borders */
    .border-gray-200 { border-color: rgba(255,255,255,.09) !important; }
    .border-gray-100 { border-color: rgba(255,255,255,.05) !important; }
    .border-t        { border-top-color:    rgba(255,255,255,.07) !important; }
    .border-b        { border-bottom-color: rgba(255,255,255,.05) !important; }

    /* Text */
    h1, h2, .text-gray-800,
    .text-gray-700           { color: #f1f5f9 !important; }
    .text-gray-600           { color: #94a3b8 !important; }
    .text-gray-500           { color: #64748b !important; }
    .text-gray-400           { color: #475569 !important; }

    /* Inputs */
    input[type="number"],
    input[type="text"],
    select {
      background: rgba(255,255,255,.07) !important;
      color: #e2e8f0 !important;
      border-color: rgba(255,255,255,.1) !important;
    }
    input::placeholder           { color: #475569 !important; }
    select option                { background: #1e293b; }
    .focus\:border-blue-400:focus { border-color: rgba(59,130,246,.6) !important; }
    .focus\:outline-none          { outline: none; }
    input[type="number"]::-webkit-inner-spin-button { opacity: 1; }

    /* Bar selection buttons (dynamic) */
    .bar-btn {
      border-color: rgba(255,255,255,.1) !important;
      background: rgba(255,255,255,.05) !important;
      color: #e2e8f0 !important;
    }
    .bar-btn.border-blue-500 {
      border-color: #3b82f6 !important;
      background: rgba(59,130,246,.12) !important;
      color: #93c5fd !important;
    }

    /* Entry type button color tints */
    .bg-blue-100   { background: rgba(59,130,246,.14) !important; }
    .text-blue-800 { color: #93c5fd !important; }
    .bg-orange-100   { background: rgba(249,115,22,.14) !important; }
    .text-orange-800 { color: #fdba74 !important; }
    .bg-green-100    { background: rgba(16,185,129,.14) !important; }
    .text-green-800  { color: #6ee7b7 !important; }
    .bg-purple-100   { background: rgba(139,92,246,.14) !important; }
    .text-purple-800 { color: #c4b5fd !important; }
    .bg-amber-100    { background: rgba(245,158,11,.14) !important; }
    .text-amber-800  { color: #fcd34d !important; }
    .bg-gray-100.text-gray-800 {
      background: rgba(255,255,255,.08) !important;
      color: #cbd5e1 !important;
    }

    /* + / − stepper buttons */
    .stepper-btn {
      background: rgba(255,255,255,.09) !important;
      color: #94a3b8 !important;
    }
    .stepper-btn:active { background: rgba(255,255,255,.16) !important; }

    /* Submit bar fixed bottom */
    .submit-bar {
      background: rgba(8,13,26,.97) !important;
      border-top: 1px solid rgba(255,255,255,.07) !important;
      box-shadow: 0 -6px 28px rgba(0,0,0,.5) !important;
    }
    .bg-green-600              { background: #10b981 !important; }
    .hover\:bg-green-700:hover { background: #059669 !important; }

    /* Misc */
    .shadow-lg    { box-shadow: 0 4px 20px rgba(0,0,0,.5) !important; }
    .font-medium  { color: #e2e8f0; }
    label         { color: #94a3b8 !important; }

    /* Lucide icon alignment */
    [data-lucide],
    i[data-lucide] { display: inline-flex; align-items: center; vertical-align: middle; }
  </style>
</head>
<body class="min-h-screen font-sans">

<!-- Toast -->
<div id="toast"
  class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-green-600 text-white
         font-semibold px-6 py-3 rounded-xl shadow-lg transition-opacity duration-300"
  style="position:relative;z-index:100">
</div>

<!-- Step: Select Bar -->
<div id="step-bar" class="hidden min-h-screen" style="position:relative;z-index:1">
  <div class="bg-gray-900 text-white px-5 py-4">
    <p class="text-xs text-gray-400 uppercase tracking-wide">Evenement</p>
    <h1 id="event-title" class="text-lg font-bold">—</h1>
  </div>
  <div class="p-4">
    <h2 class="text-base font-semibold text-gray-700 mb-3">Welke bar ben jij?</h2>
    <div id="bar-buttons" class="space-y-2"></div>
  </div>
</div>

<!-- Step: Select Entry Type -->
<div id="step-type" class="hidden min-h-screen" style="position:relative;z-index:1">
  <div class="bg-gray-900 text-white px-5 py-4 flex items-center justify-between">
    <div>
      <p class="text-xs text-gray-400 uppercase tracking-wide">Jouw bar</p>
      <h1 id="selected-bar-name" class="text-lg font-bold">—</h1>
    </div>
    <button onclick="showStep('step-bar')"
      class="flex items-center gap-1 text-gray-400 hover:text-white text-sm transition-colors">
      <i data-lucide="repeat-2" style="width:14px;height:14px"></i> Wissel bar
    </button>
  </div>
  <div class="p-4">
    <h2 class="text-base font-semibold text-gray-700 mb-3">Wat wil je invoeren?</h2>
    <div id="type-buttons" class="space-y-2"></div>
  </div>
</div>

<!-- Step: Entry form -->
<div id="step-entries" class="hidden min-h-screen pb-24" style="position:relative;z-index:1">
  <div class="bg-gray-900 text-white px-5 py-4 flex items-center justify-between">
    <div>
      <div id="entry-type-label" class="text-lg font-bold flex items-center gap-2">—</div>
      <p id="entry-bar-label" class="text-xs text-gray-400">—</p>
    </div>
    <button onclick="showStep('step-type')"
      class="flex items-center gap-1 text-gray-400 hover:text-white text-sm transition-colors">
      <i data-lucide="arrow-left" style="width:14px;height:14px"></i> Terug
    </button>
  </div>
  <div id="entry-form-body" class="p-4 space-y-1"></div>
  <div class="submit-bar fixed bottom-0 left-0 right-0 p-4">
    <button id="submit-btn"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 text-lg rounded-xl
             active:scale-95 transition-all flex items-center justify-center gap-2">
      <i data-lucide="check-circle-2" style="width:20px;height:20px"></i> Opslaan
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/form.js"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
