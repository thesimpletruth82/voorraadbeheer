<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Users & Roles</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .user-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .user-row:last-child { border-bottom: none; }
    .user-info { flex: 1; min-width: 0; }
    .user-email { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-sub   { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .user-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .role-select {
      background: var(--bg-input); border: 1px solid var(--border2);
      color: var(--text); border-radius: 6px; padding: 4px 8px;
      font-size: 12px; font-family: inherit;
    }
    .invite-link-box {
      display: flex; gap: 6px; align-items: center;
      background: rgba(0,0,0,.2);
      border-radius: 6px; padding: 6px 10px;
      font-family: ui-monospace, monospace; font-size: 11px;
      color: var(--text2);
      overflow: hidden;
    }
    .invite-link-box code { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .assign-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 999px;
      background: rgba(139,92,246,.12);
      color: #c4b5fd;
      font-size: 11px;
      margin: 2px 4px 2px 0;
    }
    .assign-chip button {
      background: none; border: none; color: inherit; cursor: pointer;
      padding: 0; display: flex; font-size: 12px;
    }
    .assign-chip svg { width: 11px; height: 11px; }
  </style>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header">
        <h1>Users &amp; Roles</h1>
        <p>Invite new users, assign roles, and manage access to events.</p>
      </div>
      <div class="page-body" id="content" style="display:none;">

        <!-- Invite form -->
        <div class="card mb-6">
          <div class="card-title"><i data-lucide="user-plus"></i> Invite User</div>
          <form id="inviteForm">
            <div class="form-row" style="gap: 10px;">
              <div class="form-group" style="flex: 2; margin-bottom: 0;">
                <label>Email</label>
                <input type="email" id="iEmail" placeholder="name@example.com" required>
              </div>
              <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label>Role</label>
                <select id="iRole" class="role-select" style="padding: 8px 10px; width: 100%;">
                  <option value="admin">Admin</option>
                  <option value="runner" selected>Runner</option>
                </select>
              </div>
              <div class="form-group" style="flex: 2; margin-bottom: 0;">
                <label>Assign to event (optional)</label>
                <select id="iEvent" class="role-select" style="padding: 8px 10px; width: 100%;">
                  <option value="">— None —</option>
                </select>
              </div>
            </div>
            <div style="margin-top: 12px;">
              <button type="submit" class="btn btn-primary" id="inviteBtn">
                <i data-lucide="send"></i> Create Invite
              </button>
            </div>
          </form>
        </div>

        <!-- Pending invites -->
        <div class="card mb-6">
          <div class="card-title"><i data-lucide="mail"></i> Pending Invites</div>
          <div id="inviteList"></div>
        </div>

        <!-- Pending approvals -->
        <div class="card mb-6" id="pendingCard" style="display:none;">
          <div class="card-title"><i data-lucide="user-check"></i> Pending Approval</div>
          <div id="pendingList"></div>
        </div>

        <!-- Active users -->
        <div class="card mb-6">
          <div class="card-title"><i data-lucide="users"></i> Users</div>
          <div id="userList"></div>
        </div>

        <!-- Per-event assignments -->
        <div class="card">
          <div class="card-title"><i data-lucide="calendar-check"></i> Event Access</div>
          <div class="form-group" style="margin-bottom: 12px;">
            <label>Select event to manage</label>
            <select id="eventPicker" class="role-select" style="padding: 8px 10px; width: 100%; max-width: 360px;"></select>
          </div>
          <div id="eventAssignments"></div>
        </div>

      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script>
    let allUsers = [], allEvents = [], allInvites = [];

    (async () => {
      const ok = await Auth.require({ superuser: true });
      if (!ok) return;
      renderNav('users');
      document.getElementById('content').style.display = '';
      await loadAll();
    })();

    async function loadAll() {
      [allUsers, allEvents, allInvites] = await Promise.all([
        DB.getAllProfiles(),
        DB.getEvents(),
        DB.getInvites(),
      ]);

      renderInviteEventOptions();
      renderEventPicker();
      renderInvites();
      renderPendingUsers();
      renderUsers();
      await renderEventAssignments();
    }

    // ── Invite form ────────────────────────────────────────
    function renderInviteEventOptions() {
      const $sel = document.getElementById('iEvent');
      $sel.innerHTML = '<option value="">— None —</option>' +
        allEvents.map(e => `<option value="${e.id}">${esc(e.name)}</option>`).join('');
    }

    document.getElementById('inviteForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const email = document.getElementById('iEmail').value.trim();
      const platformRole = document.getElementById('iRole').value;
      const eventId = document.getElementById('iEvent').value || null;
      if (!email) return;

      const btn = document.getElementById('inviteBtn');
      btn.disabled = true;
      const { data, error } = await DB.createInvite({ email, platformRole, eventId });
      btn.disabled = false;
      if (error) { toast(error.message, 'err'); return; }
      toast('Invite created');
      document.getElementById('inviteForm').reset();
      document.getElementById('iRole').value = 'runner';
      await loadAll();
    });

    // ── Pending invites ────────────────────────────────────
    function renderInvites() {
      const now = new Date();
      const open = allInvites.filter(i => !i.accepted_at);
      const $list = document.getElementById('inviteList');
      if (!open.length) {
        $list.innerHTML = '<div class="text-muted text-sm" style="padding:8px 0;">No pending invites.</div>';
        return;
      }
      $list.innerHTML = open.map(i => {
        const link = `${location.origin}/signup?email=${encodeURIComponent(i.email)}`;
        const eventLabel = i.event?.name ? ` · ${esc(i.event.name)}` : '';
        const exp = i.expires_at ? new Date(i.expires_at) : null;
        const expired = exp && exp < now;
        const expLabel = exp
          ? expired
            ? `<span style="color:var(--red);font-weight:600;">Expired ${exp.toLocaleDateString()}</span>`
            : `<span style="color:var(--text3);">Expires ${exp.toLocaleDateString()}</span>`
          : '';
        return `
          <div class="user-row" style="${expired ? 'opacity:.5;' : ''}">
            <div class="user-info">
              <div class="user-email">${esc(i.email)}</div>
              <div class="user-sub">
                <span class="badge badge-purple">${i.platform_role}</span>${eventLabel}
                ${expLabel ? ` · ${expLabel}` : ''}
              </div>
              ${!expired ? `<div class="invite-link-box" style="margin-top:6px;">
                <code id="link-${i.id}">${esc(link)}</code>
                <button class="btn btn-sm btn-ghost" onclick="copyLink('${i.id}')"><i data-lucide="copy"></i> Copy</button>
              </div>` : ''}
            </div>
            <div class="user-actions">
              <button class="btn btn-sm btn-danger" onclick="revokeInvite('${i.id}')">
                <i data-lucide="trash-2"></i>
              </button>
            </div>
          </div>`;
      }).join('');
      lucide.createIcons();
    }

    // ── Pending users (signed up but not yet approved) ─────
    function renderPendingUsers() {
      const pending = allUsers.filter(u => u.status === 'pending');
      const $card = document.getElementById('pendingCard');
      const $list = document.getElementById('pendingList');

      if (!pending.length) {
        $card.style.display = 'none';
        return;
      }
      $card.style.display = '';
      $list.innerHTML = pending.map(u => `
        <div class="user-row">
          <div class="user-info">
            <div class="user-email">${esc(u.email)}</div>
            <div class="user-sub">
              <span class="badge badge-gray">Pending</span>
              <span class="text-muted" style="font-size:11px;"> · Signed up ${new Date(u.created_at).toLocaleDateString()}</span>
            </div>
          </div>
          <div class="user-actions">
            <select class="role-select" id="pending-role-${u.id}">
              <option value="admin">Admin</option>
              <option value="runner" selected>Runner</option>
            </select>
            <button class="btn btn-sm btn-success" onclick="approveUser('${u.id}')">
              <i data-lucide="check"></i> Approve
            </button>
            <button class="btn btn-sm btn-danger" onclick="removeUser('${u.id}')">
              <i data-lucide="trash-2"></i>
            </button>
          </div>
        </div>`).join('');
      lucide.createIcons();
    }

    async function approveUser(userId) {
      const role = document.getElementById('pending-role-' + userId)?.value || 'runner';
      // First set the role (in case they need admin), then approve
      await DB.updatePlatformRole(userId, role);
      const { error } = await DB.approveUser(userId);
      if (error) { toast(error.message, 'err'); return; }
      toast('User approved');
      await loadAll();
    }

    function copyLink(id) {
      const code = document.getElementById('link-' + id);
      navigator.clipboard.writeText(code.textContent).then(
        () => toast('Link copied'),
        () => toast('Copy failed — select the link manually', 'err')
      );
    }

    async function revokeInvite(id) {
      if (!confirm('Revoke this invite?')) return;
      const { error } = await DB.deleteInvite(id);
      if (error) { toast(error.message, 'err'); return; }
      toast('Invite revoked');
      await loadAll();
    }

    // ── Users (active only — pending shown in their own card) ─
    function renderUsers() {
      const $list = document.getElementById('userList');
      const active = allUsers.filter(u => u.status !== 'pending');
      if (!active.length) {
        $list.innerHTML = '<div class="text-muted text-sm" style="padding:8px 0;">No active users yet.</div>';
        return;
      }
      $list.innerHTML = active.map(u => {
        const isSelf = u.id === Auth.user.id;
        const badgeClass = u.platform_role === 'superuser' ? 'badge-red'
                         : u.platform_role === 'admin'     ? 'badge-blue'
                         : 'badge-gray';
        return `
          <div class="user-row">
            <div class="user-info">
              <div class="user-email">${esc(u.email)}${isSelf ? ' <span class="badge badge-green" style="margin-left:6px;">you</span>' : ''}</div>
              <div class="user-sub"><span class="badge ${badgeClass}">${u.platform_role}</span></div>
            </div>
            <div class="user-actions">
              <select class="role-select" ${isSelf ? 'disabled' : ''} onchange="changeRole('${u.id}', this.value)">
                <option value="superuser" ${u.platform_role === 'superuser' ? 'selected' : ''}>Superuser</option>
                <option value="admin"     ${u.platform_role === 'admin'     ? 'selected' : ''}>Admin</option>
                <option value="runner"    ${u.platform_role === 'runner'    ? 'selected' : ''}>Runner</option>
              </select>
              <button class="btn btn-sm btn-danger" ${isSelf ? 'disabled' : ''} onclick="removeUser('${u.id}')">
                <i data-lucide="trash-2"></i>
              </button>
            </div>
          </div>`;
      }).join('');
      lucide.createIcons();
    }

    async function changeRole(userId, newRole) {
      const { error } = await DB.updatePlatformRole(userId, newRole);
      if (error) { toast(error.message, 'err'); return; }
      toast('Role updated');
      await loadAll();
    }

    async function removeUser(userId) {
      if (!confirm('Remove this user? Their auth account remains in Supabase — delete it from the dashboard if you want to fully remove them.')) return;
      const { error } = await DB.deleteProfile(userId);
      if (error) { toast(error.message, 'err'); return; }
      toast('User removed');
      await loadAll();
    }

    // ── Per-event assignments ──────────────────────────────
    function renderEventPicker() {
      const $p = document.getElementById('eventPicker');
      if (!allEvents.length) {
        $p.innerHTML = '<option value="">— No events —</option>';
        return;
      }
      $p.innerHTML = allEvents.map(e => `<option value="${e.id}">${esc(e.name)}</option>`).join('');
      $p.onchange = renderEventAssignments;
    }

    async function renderEventAssignments() {
      const eid = document.getElementById('eventPicker').value;
      const $box = document.getElementById('eventAssignments');
      if (!eid) {
        $box.innerHTML = '<div class="text-muted text-sm">Create an event first.</div>';
        return;
      }

      const assignments = await DB.getEventAssignments(eid);
      const assigned = new Set(assignments.map(a => a.user_id));

      const assignable = allUsers.filter(u => u.platform_role !== 'superuser' && u.status !== 'pending');

      const chips = assignments.length
        ? assignments.map(a => `
            <span class="assign-chip">
              ${esc(a.email)} · ${a.platform_role || '?'}
              <button onclick="unassign('${eid}','${a.user_id}')" title="Remove"><i data-lucide="x"></i></button>
            </span>`).join('')
        : '<div class="text-muted text-sm">No one assigned yet.</div>';

      const addOpts = assignable
        .filter(u => !assigned.has(u.id))
        .map(u => `<option value="${u.id}">${esc(u.email)} (${u.platform_role})</option>`)
        .join('');

      $box.innerHTML = `
        <div style="margin-bottom: 10px;">${chips}</div>
        ${addOpts ? `
          <div style="display:flex; gap:8px; align-items:flex-end;">
            <div class="form-group" style="flex:1; margin-bottom:0;">
              <label>Add user</label>
              <select id="addUserSel" class="role-select" style="padding:8px 10px; width:100%;">
                ${addOpts}
              </select>
            </div>
            <button class="btn btn-primary" onclick="assignNow('${eid}')">
              <i data-lucide="user-check"></i> Assign
            </button>
          </div>` : '<div class="text-muted text-sm">All eligible users already assigned.</div>'}
      `;
      lucide.createIcons();
    }

    async function assignNow(eid) {
      const uid = document.getElementById('addUserSel').value;
      if (!uid) return;
      const { error } = await DB.assignUserToEvent(eid, uid);
      if (error) { toast(error.message, 'err'); return; }
      toast('Assigned');
      await renderEventAssignments();
    }

    async function unassign(eid, uid) {
      const { error } = await DB.unassignUserFromEvent(eid, uid);
      if (error) { toast(error.message, 'err'); return; }
      toast('Removed');
      await renderEventAssignments();
    }
  </script>
</body>
</html>
