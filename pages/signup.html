<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Create account</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .auth-shell { width: 100%; max-width: 380px; position: relative; z-index: 1; }
    .auth-brand {
      display: flex; align-items: center; gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .auth-brand .sidebar-icon { width: 40px; height: 40px; }
    .auth-brand .sidebar-icon svg { width: 22px; height: 22px; }
    .auth-brand-title { font-size: 20px; font-weight: 700; color: #f1f5f9; letter-spacing: -.01em; }
    .auth-title   { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .auth-sub     { font-size: 13px; color: var(--text3); margin-bottom: 18px; }
    .auth-switch  { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text3); }
    .auth-info {
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 12px; color: var(--text2);
      display: flex; gap: 8px; align-items: flex-start;
    }
    .auth-info svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-brand">
      <div class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></div>
      <span class="auth-brand-title">StockFest</span>
    </div>

    <div class="card">
      <div class="auth-title">Create account</div>
      <div class="auth-sub" id="sub">Sign up with the email address you were invited with.</div>

      <div class="auth-info">
        <i data-lucide="info"></i>
        <span>You need an invite from an admin. Sign up with the exact email address that was invited — your role will be applied automatically.</span>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label>Password <span style="color:var(--text4); font-weight:400;">(min. 6 characters)</span></label>
          <input type="password" id="password" autocomplete="new-password" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <i data-lucide="user-plus"></i> Create account
        </button>
      </form>
    </div>

    <div class="auth-switch">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    lucide.createIcons();

    // If ?email= is in the URL (from an invite link), pre-fill it
    const params = new URLSearchParams(location.search);
    const emailParam = params.get('email');
    if (emailParam) {
      document.getElementById('email').value = emailParam;
      document.getElementById('sub').textContent = 'You were invited — just choose a password to continue.';
    }

    // If already signed in, just bounce
    (async () => {
      await Auth.init();
      if (Auth.signedIn()) location.replace('/');
    })();

    document.getElementById('signupForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const { data, error } = await Auth.signUp(email, password);
      btn.disabled = false;
      if (error) { toast(error.message, 'err'); return; }

      if (!data.session) {
        // Email confirmation is enabled on this Supabase project
        toast('Check your email to confirm your account');
        return;
      }
      toast('Account created');
      // Redirect based on role (trigger has run by now)
      await Auth.refresh();
      if (Auth.isRunner()) location.replace('/sales');
      else location.replace('/');
    });
  </script>
</body>
</html>
