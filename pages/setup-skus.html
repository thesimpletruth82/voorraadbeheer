<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Products</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .sku-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .sku-row:last-child { border-bottom: none; }
    .sku-row:hover { background: rgba(255,255,255,.02); }
    .sku-order {
      font-size: 11px;
      color: var(--text4);
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .sku-name {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sku-unit {
      flex-shrink: 0;
    }
    .sku-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .move-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      transition: background .1s;
      padding: 0;
    }
    .move-btn:hover { background: rgba(255,255,255,.1); color: var(--text); }
    .move-btn:disabled { opacity: .25; cursor: default; }
    .move-btn svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header">
        <h1>Products (SKUs)</h1>
        <p>Manage the global product catalog. Drag to reorder — order is used everywhere.</p>
      </div>
      <div class="page-body">
        <div class="card mb-6">
          <div class="card-title"><i data-lucide="plus-circle"></i> Add Product</div>
          <form id="addForm" class="form-row" style="align-items:flex-end; gap:10px;">
            <div class="form-group" style="flex:2; margin-bottom:0;">
              <label>Product Name</label>
              <input type="text" id="skuName" placeholder="e.g. Heineken 33cl" required>
            </div>
            <div class="form-group" style="flex:1; margin-bottom:0;">
              <label>Unit</label>
              <select id="skuUnit">
                <option value="liters">Liters</option>
                <option value="tray">Tray</option>
                <option value="bottle">Bottle</option>
                <option value="box">Box</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary"><i data-lucide="plus"></i> Add</button>
          </form>
        </div>

        <div id="skuList"></div>
      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/db.js"></script>
  <script>
    renderNav('skus');

    let skus = [];

    async function loadSkus() {
      skus = await DB.getSkus();
      const $list = document.getElementById('skuList');

      if (!skus.length) {
        $list.innerHTML = `<div class="empty-state"><i data-lucide="package"></i><h3>No products yet</h3><p>Add your first product above.</p></div>`;
        lucide.createIcons();
        return;
      }

      $list.innerHTML = `
        <div class="card">
          <div class="card-title"><i data-lucide="package"></i> ${skus.length} Product${skus.length > 1 ? 's' : ''}</div>
          ${skus.map((s, i) => `
            <div class="sku-row" data-id="${s.id}">
              <div class="sku-order">${i + 1}</div>
              <div class="sku-name">${esc(s.name)}</div>
              <div class="sku-unit"><span class="badge badge-blue">${esc(s.unit)}</span></div>
              <div class="sku-actions">
                <button class="move-btn" onclick="move('${s.id}',-1)" ${i === 0 ? 'disabled' : ''} title="Move up"><i data-lucide="chevron-up"></i></button>
                <button class="move-btn" onclick="move('${s.id}',1)" ${i === skus.length - 1 ? 'disabled' : ''} title="Move down"><i data-lucide="chevron-down"></i></button>
                <button class="btn btn-sm btn-danger" onclick="delSku('${s.id}')"><i data-lucide="trash-2"></i></button>
              </div>
            </div>
          `).join('')}
        </div>`;
      lucide.createIcons();
    }

    async function move(id, dir) {
      const idx = skus.findIndex(s => s.id === id);
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= skus.length) return;

      // Swap in local array
      [skus[idx], skus[newIdx]] = [skus[newIdx], skus[idx]];

      // Save new order to DB
      const orderedIds = skus.map(s => s.id);
      await DB.reorderSkus(orderedIds);

      // Re-render
      loadSkus();
    }

    document.getElementById('addForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const name = document.getElementById('skuName').value.trim();
      const unit = document.getElementById('skuUnit').value;
      if (!name) return;
      const btn = ev.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      const { error } = await DB.createSku(name, unit);
      btn.disabled = false;
      if (error) { toast(error.message, 'err'); return; }
      toast('Product added');
      document.getElementById('skuName').value = '';
      loadSkus();
    });

    async function delSku(id) {
      if (!confirm('Delete this product?')) return;
      const { error } = await DB.deleteSku(id);
      if (error) { toast(error.message, 'err'); return; }
      toast('Product deleted');
      loadSkus();
    }

    loadSkus();
  </script>
</body>
</html>
