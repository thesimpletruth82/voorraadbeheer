<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Locations</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header">
        <h1>Locations</h1>
        <p>Add bars, stages, and storage points for the active event.</p>
      </div>
      <div class="page-body">
        <div id="noEvent" class="empty-state hidden">
          <i data-lucide="alert-circle"></i>
          <h3>No active event</h3>
          <p>Select or activate an event on the <a href="/">Events page</a> first.</p>
        </div>

        <div id="content" class="hidden">
          <div class="card mb-6">
            <div class="card-title"><i data-lucide="plus-circle"></i> Add Location</div>
            <form id="addForm" class="form-row" style="align-items:flex-end; gap:10px;">
              <div class="form-group" style="flex:1; margin-bottom:0;">
                <label>Location Name</label>
                <input type="text" id="locName" placeholder="e.g. Bar North, Storage" required>
              </div>
              <button type="submit" class="btn btn-primary"><i data-lucide="plus"></i> Add</button>
            </form>
          </div>

          <div id="locList"></div>
        </div>
      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/db.js"></script>
  <script>
    renderNav('locations');

    const eventId = Ctx.id();
    if (!eventId) {
      document.getElementById('noEvent').classList.remove('hidden');
    } else {
      document.getElementById('content').classList.remove('hidden');
      init();
    }

    async function init() {
      await loadLocations();

      document.getElementById('addForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const name = document.getElementById('locName').value.trim();
        if (!name) return;
        const btn = ev.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        const { error } = await DB.createLocation(eventId, name);
        btn.disabled = false;
        if (error) { toast(error.message, 'err'); return; }
        toast('Location added');
        document.getElementById('locName').value = '';
        loadLocations();
      });
    }

    async function loadLocations() {
      const locs = await DB.getLocations(eventId);
      const $list = document.getElementById('locList');

      if (!locs.length) {
        $list.innerHTML = `<div class="empty-state"><i data-lucide="map-pin"></i><h3>No locations yet</h3><p>Add your first bar or storage location above.</p></div>`;
        lucide.createIcons();
        return;
      }

      $list.innerHTML = `
        <div class="card">
          <div class="card-title"><i data-lucide="map-pin"></i> ${locs.length} Location${locs.length > 1 ? 's' : ''}</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Name</th><th class="right">Actions</th></tr></thead>
              <tbody>
                ${locs.map(l => `
                  <tr>
                    <td><strong>${esc(l.name)}</strong></td>
                    <td class="right">
                      <button class="btn btn-sm btn-danger" onclick="delLoc('${l.id}')"><i data-lucide="trash-2"></i></button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
      lucide.createIcons();
    }

    async function delLoc(id) {
      if (!confirm('Delete this location?')) return;
      const { error } = await DB.deleteLocation(id);
      if (error) { toast(error.message, 'err'); return; }
      toast('Location deleted');
      loadLocations();
    }
  </script>
</body>
</html>
