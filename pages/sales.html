<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Sales</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .liter-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .liter-row:last-child { border-bottom: none; }
    .liter-info { flex: 1; min-width: 0; }
    .liter-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .liter-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .liter-expected { font-weight: 600; color: var(--text2); }
    .liter-delta { font-size: 12px; font-weight: 700; min-width: 60px; text-align: center; }
    .delta-sold { color: #f43f5e; }
    .delta-surplus { color: var(--green); }
    .delta-none { color: var(--text4); }
  </style>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header">
        <h1>Sales</h1>
        <p>Tap products to log sales. For liters, enter how much is left.</p>
      </div>
      <div class="page-body">
        <div id="noEvent" class="empty-state hidden">
          <i data-lucide="alert-circle"></i>
          <h3>No active event</h3>
          <p>Select or activate an event on the <a href="/">Events page</a> first.</p>
        </div>

        <div id="content" class="hidden">
          <!-- Location picker -->
          <div class="form-group mb-6">
            <label>Your Location</label>
            <select id="saleLoc" style="font-size:15px; padding:12px;"></select>
          </div>

          <!-- Summary bar + submit -->
          <div class="sale-summary hidden" id="summary">
            <div>
              <div class="sale-summary-count" id="totalCount">0 items</div>
              <div class="sale-summary-label">Ready to submit</div>
            </div>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-ghost btn-sm" onclick="clearTaps()"><i data-lucide="x"></i> Clear</button>
              <button class="btn btn-success" onclick="submitAll()" id="submitBtn"><i data-lucide="check"></i> Submit Sales</button>
            </div>
          </div>

          <!-- Tap grid for non-liters -->
          <div class="sales-grid" id="grid"></div>

          <!-- Liters section -->
          <div class="card mb-6 hidden" id="litersCard">
            <div class="card-title"><i data-lucide="droplets"></i> Liters — enter what's left</div>
            <div id="litersRows"></div>
          </div>

          <!-- Recent sales -->
          <div class="card">
            <div class="card-title"><i data-lucide="clock"></i> Recent Sales</div>
            <div id="feed"></div>
          </div>
        </div>
      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/db.js"></script>
  <script>
    renderNav('sales');

    const eventId = Ctx.id();
    if (!eventId) {
      document.getElementById('noEvent').classList.remove('hidden');
    } else {
      document.getElementById('content').classList.remove('hidden');
      init();
    }

    let locations = [], skus = [], tapCounts = {}, expectedStock = {};
    const LAST_LOC_KEY = 'sf_sales_loc';

    async function init() {
      [locations, skus] = await Promise.all([
        DB.getLocations(eventId),
        DB.getSkus(),
      ]);

      if (!locations.length || !skus.length) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <i data-lucide="alert-circle"></i>
            <h3>Setup required</h3>
            <p>${!locations.length ? 'Add <a href="/pages/setup-locations.html">locations</a> first.' : 'Add <a href="/pages/setup-skus.html">products</a> first.'}</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      const $loc = document.getElementById('saleLoc');
      $loc.innerHTML = locations.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
      const lastLoc = localStorage.getItem(LAST_LOC_KEY);
      if (lastLoc && locations.find(l => l.id === lastLoc)) $loc.value = lastLoc;
      $loc.addEventListener('change', () => {
        localStorage.setItem(LAST_LOC_KEY, $loc.value);
        loadLocation();
      });

      await loadLocation();
    }

    async function loadLocation() {
      expectedStock = await DB.computeCurrentStock(eventId);
      renderGrid();
      renderLiters();
      loadFeed();
    }

    // ── Tap grid (non-liters) ─────────────────────────
    function renderGrid() {
      const nonLiters = skus.filter(s => s.unit !== 'liters');
      document.getElementById('grid').innerHTML = nonLiters.map(s => {
        const count = tapCounts[s.id] || 0;
        return `
          <button class="sale-btn${count ? ' has-count' : ''}" onclick="tap('${s.id}')" id="btn-${s.id}">
            ${count ? `<div class="sale-badge" id="badge-${s.id}">${count}</div>` : ''}
            <div class="sale-btn-name">${esc(s.name)}</div>
            <div class="sale-btn-unit">${esc(s.unit)}</div>
          </button>`;
      }).join('');
      updateSummary();
    }

    function tap(skuId) {
      tapCounts[skuId] = (tapCounts[skuId] || 0) + 1;
      const btn = document.getElementById('btn-' + skuId);
      btn.classList.add('has-count');
      let badge = document.getElementById('badge-' + skuId);
      if (badge) {
        badge.textContent = tapCounts[skuId];
      } else {
        badge = document.createElement('div');
        badge.className = 'sale-badge';
        badge.id = 'badge-' + skuId;
        badge.textContent = tapCounts[skuId];
        btn.prepend(badge);
      }
      updateSummary();
    }

    function updateSummary() {
      const total = Object.values(tapCounts).reduce((a, b) => a + b, 0);
      const $summary = document.getElementById('summary');
      const $count = document.getElementById('totalCount');
      if (total > 0) {
        $summary.classList.remove('hidden');
        $count.textContent = total + ' item' + (total !== 1 ? 's' : '');
      } else {
        $summary.classList.add('hidden');
      }
    }

    function clearTaps() {
      tapCounts = {};
      renderGrid();
    }

    // ── Liters section (enter remaining) ──────────────
    function renderLiters() {
      const locId = document.getElementById('saleLoc').value;
      const locStock = expectedStock[locId] || {};
      const liters = skus.filter(s => s.unit === 'liters' && (locStock[s.id] || 0) > 0);

      const $card = document.getElementById('litersCard');
      if (!liters.length) {
        $card.classList.add('hidden');
        return;
      }
      $card.classList.remove('hidden');

      document.getElementById('litersRows').innerHTML = liters.map(s => {
        const exp = Math.round(locStock[s.id] || 0);
        return `
          <div class="liter-row">
            <div class="liter-info">
              <div class="liter-name">${esc(s.name)}</div>
              <div class="liter-meta">Expected: <span class="liter-expected">${exp}</span> liters</div>
            </div>
            <div class="stepper stepper-lg">
              <button type="button" class="stepper-btn" onclick="literStep('${s.id}',-10)">−</button>
              <input type="number" id="liter-${s.id}" data-expected="${exp}" value="" min="0" placeholder="${exp}" onchange="literDelta('${s.id}')">
              <button type="button" class="stepper-btn" onclick="literStep('${s.id}',10)">+</button>
            </div>
            <div class="liter-delta delta-none" id="ldelta-${s.id}">—</div>
          </div>`;
      }).join('');
      lucide.createIcons();
    }

    function literStep(skuId, delta) {
      const input = document.getElementById('liter-' + skuId);
      const exp = parseInt(input.dataset.expected) || 0;
      const cur = input.value === '' ? exp : parseInt(input.value) || 0;
      input.value = Math.max(0, cur + delta);
      literDelta(skuId);
    }

    function literDelta(skuId) {
      const input = document.getElementById('liter-' + skuId);
      const $d = document.getElementById('ldelta-' + skuId);
      const exp = parseInt(input.dataset.expected) || 0;

      if (input.value === '') {
        $d.textContent = '—';
        $d.className = 'liter-delta delta-none';
        return;
      }
      const actual = parseInt(input.value) || 0;
      const sold = exp - actual;
      if (sold > 0) {
        $d.textContent = '−' + sold + 'L sold';
        $d.className = 'liter-delta delta-sold';
      } else if (sold < 0) {
        $d.textContent = '+' + Math.abs(sold) + 'L';
        $d.className = 'liter-delta delta-surplus';
      } else {
        $d.textContent = '0';
        $d.className = 'liter-delta delta-none';
      }
    }

    // ── Submit all (taps + liters) ────────────────────
    async function submitAll() {
      const locId = document.getElementById('saleLoc').value;
      const locStock = expectedStock[locId] || {};
      const sales = [];

      // Tap-based sales (non-liters)
      for (const [skuId, qty] of Object.entries(tapCounts)) {
        if (qty > 0) sales.push({ skuId, quantity: qty });
      }

      // Liter-based sales (compute delta)
      const liters = skus.filter(s => s.unit === 'liters' && (locStock[s.id] || 0) > 0);
      for (const s of liters) {
        const input = document.getElementById('liter-' + s.id);
        if (input && input.value !== '') {
          const exp = parseInt(input.dataset.expected) || 0;
          const actual = parseInt(input.value) || 0;
          const sold = exp - actual;
          if (sold > 0) sales.push({ skuId: s.id, quantity: sold });
        }
      }

      if (!sales.length) { toast('Nothing to submit', 'err'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;

      const promises = sales.map(s =>
        DB.createMovement({
          eventId, fromLocationId: locId, toLocationId: null,
          skuId: s.skuId, quantity: s.quantity, type: 'sale', notes: null,
        })
      );

      const results = await Promise.all(promises);
      btn.disabled = false;

      const err = results.find(r => r.error);
      if (err) { toast(err.error.message, 'err'); return; }

      const total = sales.reduce((a, s) => a + s.quantity, 0);
      toast(`${total} sold logged`);

      tapCounts = {};
      await loadLocation();
    }

    // ── Feed ──────────────────────────────────────────
    async function loadFeed() {
      const locId = document.getElementById('saleLoc')?.value;
      const allMoves = await DB.getMovements(eventId, 50);
      const sales = allMoves.filter(m => m.type === 'sale' && m.from_location_id === locId).slice(0, 15);

      const $feed = document.getElementById('feed');
      if (!sales.length) {
        $feed.innerHTML = '<div class="text-muted text-sm" style="padding:12px 0;">No sales yet at this location.</div>';
        return;
      }

      $feed.innerHTML = sales.map(m => {
        const time = new Date(m.moved_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const skuName = m.sku?.name || '?';
        return `
          <div class="feed-item">
            <div class="feed-dot sale"></div>
            <div class="feed-main">
              <div class="feed-title">${esc(skuName)}</div>
              <div class="feed-meta">Sold · ${time}</div>
            </div>
            <div class="feed-qty">−${m.quantity}</div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
