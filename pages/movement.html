<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Log Movement</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header">
        <h1>Log Movement</h1>
        <p>Record transfers between locations or new deliveries.</p>
      </div>
      <div class="page-body">
        <div id="noEvent" class="empty-state hidden">
          <i data-lucide="alert-circle"></i>
          <h3>No active event</h3>
          <p>Select or activate an event on the <a href="/">Events page</a> first.</p>
        </div>

        <div id="content" class="hidden">
          <!-- Type selector -->
          <div class="type-cards">
            <button class="type-card active" id="typeTransfer" onclick="setType('transfer')">
              <i data-lucide="arrow-right-left"></i>
              <span>Transfer</span>
              <small>Between locations</small>
            </button>
            <button class="type-card" id="typeDelivery" onclick="setType('delivery')">
              <i data-lucide="truck"></i>
              <span>Delivery</span>
              <small>New stock arriving</small>
            </button>
          </div>

          <div class="card mb-6">
            <form id="moveForm">
              <div id="fromGroup" class="form-group">
                <label>From Location</label>
                <select id="fromLoc" required></select>
              </div>
              <div class="form-group">
                <label>To Location</label>
                <select id="toLoc" required></select>
              </div>
              <div class="form-group">
                <label>Product</label>
                <select id="moveSku" required></select>
              </div>
              <div class="form-group">
                <label>Quantity</label>
                <div class="stepper stepper-lg">
                  <button type="button" class="stepper-btn" onclick="stepQty(-1)">−</button>
                  <input type="number" id="moveQty" value="1" min="1" required>
                  <button type="button" class="stepper-btn" onclick="stepQty(1)">+</button>
                </div>
              </div>
              <div class="form-group">
                <label>Notes (optional)</label>
                <input type="text" id="moveNotes" placeholder="e.g. Emergency restock">
              </div>
              <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
                <i data-lucide="check"></i> Log Movement
              </button>
            </form>
          </div>

          <!-- Recent movements -->
          <div class="card">
            <div class="card-title"><i data-lucide="clock"></i> Recent Movements</div>
            <div id="feed"></div>
          </div>
        </div>
      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script>
    let eventId;
    (async () => {
      if (!(await Auth.require())) return;
      renderNav('movement');
      eventId = await Ctx.ensure();
      renderNav('movement');
      if (!eventId) {
        document.getElementById('noEvent').classList.remove('hidden');
      } else {
        document.getElementById('content').classList.remove('hidden');
        init();
      }
    })();

    let moveType = 'transfer';

    function setType(type) {
      moveType = type;
      document.getElementById('typeTransfer').classList.toggle('active', type === 'transfer');
      document.getElementById('typeDelivery').classList.toggle('active', type === 'delivery');
      document.getElementById('fromGroup').style.display = type === 'transfer' ? '' : 'none';
      document.getElementById('fromLoc').required = type === 'transfer';
    }

    function stepQty(delta) {
      const input = document.getElementById('moveQty');
      input.value = Math.max(1, (parseInt(input.value) || 0) + delta);
    }

    async function init() {
      const [locations, skus] = await Promise.all([
        DB.getLocations(eventId),
        DB.getSkus(eventId),
      ]);

      if (!locations.length || !skus.length) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <i data-lucide="alert-circle"></i>
            <h3>Setup required</h3>
            <p>${!locations.length ? 'Add <a href="/pages/setup-locations.html">locations</a> first.' : 'Add <a href="/pages/setup-skus.html">products</a> first.'}</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      const locOpts = locations.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
      document.getElementById('fromLoc').innerHTML = locOpts;
      document.getElementById('toLoc').innerHTML = locOpts;
      if (locations.length > 1) document.getElementById('toLoc').selectedIndex = 1;

      document.getElementById('moveSku').innerHTML = skus.map(s =>
        `<option value="${s.id}">${esc(s.name)} (${esc(s.unit)})</option>`
      ).join('');

      document.getElementById('moveForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const btn = ev.target.querySelector('button[type="submit"]');
        btn.disabled = true;

        const fromId = moveType === 'transfer' ? document.getElementById('fromLoc').value : null;
        const toId = document.getElementById('toLoc').value;
        const skuId = document.getElementById('moveSku').value;
        const qty = parseInt(document.getElementById('moveQty').value) || 0;
        const notes = document.getElementById('moveNotes').value.trim();

        if (moveType === 'transfer' && fromId === toId) {
          toast('From and To must be different', 'err');
          btn.disabled = false;
          return;
        }
        if (qty < 1) {
          toast('Quantity must be at least 1', 'err');
          btn.disabled = false;
          return;
        }

        const { error } = await DB.createMovement({
          eventId, fromLocationId: fromId, toLocationId: toId,
          skuId, quantity: qty, type: moveType, notes,
        });
        btn.disabled = false;

        if (error) { toast(error.message, 'err'); return; }
        toast('Movement logged');
        document.getElementById('moveQty').value = 1;
        document.getElementById('moveNotes').value = '';
        loadFeed();
      });

      loadFeed();
    }

    async function loadFeed() {
      const moves = await DB.getMovements(eventId, 20);
      const $feed = document.getElementById('feed');

      if (!moves.length) {
        $feed.innerHTML = '<div class="text-muted text-sm" style="padding:12px 0;">No movements yet.</div>';
        return;
      }

      $feed.innerHTML = moves.map(m => {
        const time = new Date(m.moved_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const skuName = m.sku?.name || '?';
        let desc = '';
        if (m.type === 'transfer') {
          desc = `${m.from_loc?.name || '?'} → ${m.to_loc?.name || '?'}`;
        } else {
          desc = `Delivery → ${m.to_loc?.name || '?'}`;
        }
        return `
          <div class="feed-item">
            <div class="feed-dot ${m.type}"></div>
            <div class="feed-main">
              <div class="feed-title">${esc(skuName)}</div>
              <div class="feed-meta">${esc(desc)}${m.notes ? ' · ' + esc(m.notes) : ''} · ${time}</div>
            </div>
            <div class="feed-qty">${m.quantity}</div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
