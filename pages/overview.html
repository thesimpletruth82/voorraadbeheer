<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Live Overview</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .bar-chart-wrap {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .chart-sections {
      display: flex;
      gap: 32px;
      overflow-x: auto;
      align-items: flex-end;
    }
    .chart-section {
      flex: none;
      min-width: 0;
    }
    .chart-section-liters .bar-col { flex: 0 0 30px; width: 30px; }
    .chart-section-liters .bar-label-col { flex: 0 0 30px; width: 30px; }
    .chart-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    /* Chart area with y-axis */
    .chart-area {
      display: flex;
      position: relative;
    }
    .chart-yaxis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      padding-right: 8px;
      height: 200px;
      flex-shrink: 0;
    }
    .chart-yaxis span {
      font-size: 9px;
      color: var(--text4);
      line-height: 1;
    }
    .chart-grid {
      position: relative;
      flex: 1;
      height: 200px;
      min-width: 0;
    }
    .chart-gridline {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
    }

    /* Bars container */
    .bar-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      height: 200px;
      position: relative;
      z-index: 1;
      overflow-x: auto;
      padding-bottom: 0;
    }
    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 0 20px;
      width: 20px;
    }
    .bar-stack {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border-radius: 3px 3px 0 0;
      overflow: visible;
      position: relative;
    }
    .bar-seg {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: height .4s ease;
      overflow: hidden;
    }
    .bar-seg-stock {
      background: rgba(52, 211, 153, .55);
      border-radius: 3px 3px 0 0;
    }
    .bar-seg-sold {
      background: rgba(244, 63, 94, .55);
    }
    .bar-seg-val {
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,.5);
      line-height: 1;
      pointer-events: none;
    }

    /* Labels below bars */
    .bar-labels {
      display: flex;
      gap: 16px;
      margin-left: 30px;
    }
    .bar-label-col {
      flex: 0 0 20px;
      width: 20px;
      height: 110px;
      position: relative;
    }
    .bar-label {
      font-size: 9px;
      color: var(--text3);
      white-space: nowrap;
      transform: rotate(-90deg);
      transform-origin: center center;
      position: absolute;
      top: 50%;
      left: 50%;
      translate: -50% -50%;
    }

    /* Legend */
    .chart-legend {
      display: flex;
      gap: 16px;
      padding: 8px 0 0;
      font-size: 11px;
      color: var(--text2);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }
    .legend-stock { background: rgba(52,211,153,.55); }
    .legend-sold  { background: rgba(244,63,94,.55); }
  </style>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1><span class="live-dot"></span> Live Overview</h1>
          <p>Real-time stock levels, burn rate, and time remaining across all locations.</p>
        </div>
      </div>
      <div class="page-body">
        <div id="noEvent" class="empty-state hidden">
          <i data-lucide="alert-circle"></i>
          <h3>No active event</h3>
          <p>Select or activate an event on the <a href="/">Events page</a> first.</p>
        </div>

        <div id="content" class="hidden">
          <div class="stats-row" id="stats"></div>
          <div id="locationCards"></div>

          <div class="card mt-4">
            <div class="card-title"><i data-lucide="clock"></i> Recent Movements</div>
            <div id="feed"></div>
          </div>
        </div>
      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/db.js"></script>
  <script>
    renderNav('overview');

    let eventId;
    (async () => {
      eventId = await Ctx.ensure();
      renderNav('overview');
      if (!eventId) {
        document.getElementById('noEvent').classList.remove('hidden');
      } else {
        document.getElementById('content').classList.remove('hidden');
        init();
      }
    })();

    const LOW_THRESHOLD = 10;

    async function init() {
      await refresh();
      setupRealtime();
      setInterval(refresh, 30000);
    }

    async function refresh() {
      const [locations, skus, breakdown, movements] = await Promise.all([
        DB.getLocations(eventId),
        DB.getSkus(),
        DB.getStockBreakdown(eventId),
        DB.getMovements(eventId, 30),
      ]);
      renderStats(locations, skus, breakdown, movements);
      renderLocationCards(locations, skus, breakdown);
      renderFeed(movements);
    }

    // ── Stats row ──────────────────────────────────────
    function renderStats(locations, skus, breakdown, movements) {
      let lowCount = 0, outCount = 0;
      for (const loc of locations) {
        const ld = breakdown[loc.id] || {};
        for (const sku of skus) {
          const d = ld[sku.id];
          if (!d) continue;
          if (d.current <= 0) outCount++;
          else if (d.current < LOW_THRESHOLD) lowCount++;
        }
      }
      const salesCount = movements.filter(m => m.type === 'sale').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon blue"><i data-lucide="map-pin"></i></div>
          <div class="stat-label">Locations</div>
          <div class="stat-value">${locations.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple"><i data-lucide="shopping-cart"></i></div>
          <div class="stat-label">Recent Sales</div>
          <div class="stat-value">${salesCount}</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ${lowCount > 0 ? 'amber' : 'green'}"><i data-lucide="alert-triangle"></i></div>
          <div class="stat-label">Low Stock</div>
          <div class="stat-value">${lowCount}</div>
          <div class="stat-sub">Below ${LOW_THRESHOLD} units</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ${outCount > 0 ? 'red' : 'green'}"><i data-lucide="x-circle"></i></div>
          <div class="stat-label">Out of Stock</div>
          <div class="stat-value">${outCount}</div>
        </div>`;
      lucide.createIcons();
    }

    // ── Helpers ────────────────────────────────────────
    function fmtHours(h) {
      if (h === null || h === undefined) return '—';
      if (h < 1) return Math.round(h * 60) + 'min';
      if (h < 24) return h.toFixed(1) + 'h';
      return Math.round(h / 24) + 'd';
    }
    function timeCls(h) {
      if (h === null || h === undefined) return 'text-muted';
      if (h < 1) return 'time-crit';
      if (h < 3) return 'time-warn';
      return 'time-ok';
    }
    function fmtBurn(b) {
      if (!b) return '—';
      return b.toFixed(1) + '/h';
    }

    // ── Location cards (table + chart) ─────────────────
    function renderLocationCards(locations, skus, breakdown) {
      const $el = document.getElementById('locationCards');

      if (!locations.length) {
        $el.innerHTML = '<div class="empty-state"><i data-lucide="map-pin"></i><h3>No locations</h3><p>Add locations in <a href="/pages/setup-locations.html">Setup</a>.</p></div>';
        lucide.createIcons();
        return;
      }

      const skuMap = {};
      skus.forEach(s => skuMap[s.id] = s);

      $el.innerHTML = locations.map(loc => {
        const ld = breakdown[loc.id] || {};
        const entries = Object.entries(ld)
          .map(([skuId, d]) => ({ sku: skuMap[skuId], ...d }))
          .filter(e => e.sku && (e.totalSupply > 0 || e.current !== 0));

        if (!entries.length) {
          return `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-title"><i data-lucide="map-pin"></i> ${esc(loc.name)}</div>
              <div class="text-muted text-sm" style="padding:4px 0;">No stock data yet.</div>
            </div>`;
        }

        // ── Table ──────────────────────────────
        const tableRows = entries.map(e => {
          let stockCls = '';
          if (e.current <= 0) stockCls = 'var-neg';
          else if (e.current < LOW_THRESHOLD) stockCls = 'style="color:var(--amber)"';
          const stockStyle = e.current <= 0 ? ' class="var-neg"' : (e.current < LOW_THRESHOLD ? ' style="color:var(--amber);font-weight:600"' : '');

          return `<tr>
            <td><strong>${esc(e.sku.name)}</strong> <span class="text-xs text-muted">${esc(e.sku.unit)}</span></td>
            <td class="right"><span${stockStyle}>${Math.round(e.current)}</span></td>
            <td class="right">${e.salesOut || 0}</td>
            <td class="right">${e.delivIn || 0}</td>
            <td class="right">${e.transIn || 0}</td>
            <td class="right">${e.transOut || 0}</td>
            <td class="right">${fmtBurn(e.burnTotal)}</td>
            <td class="right">${fmtBurn(e.burnRecent)}</td>
            <td class="right"><span class="${timeCls(e.hoursLeft)}" style="font-weight:600">${fmtHours(e.hoursLeft)}</span></td>
          </tr>`;
        }).join('');

        // ── Stacked bar charts — one section per UOM ──
        const byUnit = {};
        for (const e of entries) {
          const u = e.sku.unit;
          if (!byUnit[u]) byUnit[u] = [];
          byUnit[u].push(e);
        }

        const chartH = 200;

        function renderSection(items, maxVal) {
          // Y-axis gridlines (5 steps)
          const steps = 5;
          const stepVal = Math.ceil(maxVal / steps);
          const niceMax = stepVal * steps;

          let gridHTML = '';
          let yLabels = '';
          for (let i = 0; i <= steps; i++) {
            const val = stepVal * i;
            const pct = (val / niceMax) * 100;
            gridHTML += `<div class="chart-gridline" style="bottom:${pct}%"></div>`;
          }
          // Y-axis labels
          let yHTML = '';
          for (let i = steps; i >= 0; i--) {
            yHTML += `<span>${stepVal * i}</span>`;
          }

          // Bars
          const barsHTML = items.map(e => {
            const total = e.totalSupply;
            const sold = e.salesOut;
            const remaining = Math.max(0, total - sold);
            const totalH = (total / niceMax) * chartH;
            const soldH = total > 0 ? (sold / total) * totalH : 0;
            const remainH = totalH - soldH;

            const stockLabel = remaining > 0 && remainH >= 16 ? `<span class="bar-seg-val">${Math.round(remaining)}</span>` : '';
            const soldLabel = sold > 0 && soldH >= 16 ? `<span class="bar-seg-val">${sold}</span>` : '';

            return `<div class="bar-col">
              <div class="bar-stack" style="height:${Math.max(totalH, 2)}px">
                <div class="bar-seg bar-seg-stock" style="height:${remainH}px">${stockLabel}</div>
                <div class="bar-seg bar-seg-sold" style="height:${soldH}px">${soldLabel}</div>
              </div>
            </div>`;
          }).join('');

          // Labels row — full name, no truncation
          const labelsHTML = items.map(e => {
            return `<div class="bar-label-col"><div class="bar-label">${esc(e.sku.name)}</div></div>`;
          }).join('');

          return `
            <div class="chart-area">
              <div class="chart-yaxis">${yHTML}</div>
              <div class="chart-grid">
                ${gridHTML}
                <div class="bar-row">${barsHTML}</div>
              </div>
            </div>
            <div class="bar-labels">${labelsHTML}</div>`;
        }

        const unitNames = Object.keys(byUnit).sort();
        let chartHTML = '<div class="chart-sections">';
        for (const unit of unitNames) {
          const items = byUnit[unit];
          const sectionMax = Math.max(...items.map(e => e.totalSupply), 1);
          const label = unit.charAt(0).toUpperCase() + unit.slice(1);
          const sectionCls = unit === 'liters' ? ' chart-section-liters' : '';
          chartHTML += `<div class="chart-section${sectionCls}">`;
          chartHTML += `<div class="chart-section-title">${esc(label)}</div>`;
          chartHTML += renderSection(items, sectionMax);
          chartHTML += `</div>`;
        }
        chartHTML += '</div>';
        chartHTML += `<div class="chart-legend">
          <span><span class="legend-dot legend-stock"></span>Remaining</span>
          <span><span class="legend-dot legend-sold"></span>Sold</span>
        </div>`;

        return `
          <div class="card" style="margin-bottom:16px;">
            <div class="card-title"><i data-lucide="map-pin"></i> ${esc(loc.name)}</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Product</th>
                    <th class="right">Stock</th>
                    <th class="right">Sold</th>
                    <th class="right">Deliv.</th>
                    <th class="right">In</th>
                    <th class="right">Out</th>
                    <th class="right">Burn/h</th>
                    <th class="right">3h Burn</th>
                    <th class="right">ETA</th>
                  </tr>
                </thead>
                <tbody>${tableRows}</tbody>
              </table>
            </div>
            <div class="bar-chart-wrap">${chartHTML}</div>
          </div>`;
      }).join('');
      lucide.createIcons();
    }

    // ── Feed ───────────────────────────────────────────
    function renderFeed(movements) {
      const $feed = document.getElementById('feed');
      if (!movements.length) {
        $feed.innerHTML = '<div class="text-muted text-sm" style="padding:12px 0;">No movements yet.</div>';
        return;
      }

      $feed.innerHTML = movements.map(m => {
        const time = new Date(m.moved_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const skuName = m.sku?.name || '?';
        let desc;
        if (m.type === 'transfer') desc = `${m.from_loc?.name || '?'} → ${m.to_loc?.name || '?'}`;
        else if (m.type === 'delivery') desc = `Delivery → ${m.to_loc?.name || '?'}`;
        else desc = `Sale @ ${m.from_loc?.name || '?'}`;

        return `
          <div class="feed-item">
            <div class="feed-dot ${m.type}"></div>
            <div class="feed-main">
              <div class="feed-title">${esc(skuName)}</div>
              <div class="feed-meta">${esc(desc)} · ${time}</div>
            </div>
            <div class="feed-qty">${m.type === 'sale' ? '−' : ''}${m.quantity}</div>
          </div>`;
      }).join('');
    }

    // ── Realtime ───────────────────────────────────────
    function setupRealtime() {
      sb().channel('overview-movements')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'movements',
          filter: `event_id=eq.${eventId}`,
        }, () => refresh())
        .subscribe();

      sb().channel('overview-counts')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'stock_counts',
          filter: `event_id=eq.${eventId}`,
        }, () => refresh())
        .subscribe();
    }
  </script>
</body>
</html>
