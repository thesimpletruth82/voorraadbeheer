<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFest — Live Overview</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1><span class="live-dot"></span> Live Overview</h1>
          <p>Real-time stock levels, burn rate, and time remaining across all locations.</p>
        </div>
      </div>
      <div class="page-body">
        <div id="noEvent" class="empty-state hidden">
          <i data-lucide="alert-circle"></i>
          <h3>No active event</h3>
          <p>Select or activate an event on the <a href="/">Events page</a> first.</p>
        </div>

        <div id="content" class="hidden">
          <!-- Stats -->
          <div class="stats-row" id="stats"></div>

          <!-- Bar charts per location -->
          <div id="charts"></div>

          <!-- Movement feed -->
          <div class="card mt-4">
            <div class="card-title"><i data-lucide="clock"></i> Recent Movements</div>
            <div id="feed"></div>
          </div>
        </div>
      </div>
    </div>
    <nav class="bottombar" id="bottombar"></nav>
  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/db.js"></script>
  <script>
    renderNav('overview');

    const eventId = Ctx.id();
    if (!eventId) {
      document.getElementById('noEvent').classList.remove('hidden');
    } else {
      document.getElementById('content').classList.remove('hidden');
      init();
    }

    const LOW_THRESHOLD = 10;

    async function init() {
      await refresh();
      setupRealtime();
      setInterval(refresh, 30000);
    }

    async function refresh() {
      const [locations, skus, breakdown, movements] = await Promise.all([
        DB.getLocations(eventId),
        DB.getSkus(),
        DB.getStockBreakdown(eventId),
        DB.getMovements(eventId, 30),
      ]);

      renderStats(locations, skus, breakdown, movements);
      renderCharts(locations, skus, breakdown);
      renderFeed(movements);
    }

    function renderStats(locations, skus, breakdown, movements) {
      let lowCount = 0, outCount = 0;
      for (const loc of locations) {
        const locData = breakdown[loc.id] || {};
        for (const sku of skus) {
          const d = locData[sku.id];
          if (!d) continue;
          if (d.current <= 0) outCount++;
          else if (d.current < LOW_THRESHOLD) lowCount++;
        }
      }

      // Total sales count
      const salesCount = movements.filter(m => m.type === 'sale').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon blue"><i data-lucide="map-pin"></i></div>
          <div class="stat-label">Locations</div>
          <div class="stat-value">${locations.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple"><i data-lucide="shopping-cart"></i></div>
          <div class="stat-label">Recent Sales</div>
          <div class="stat-value">${salesCount}</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ${lowCount > 0 ? 'amber' : 'green'}"><i data-lucide="alert-triangle"></i></div>
          <div class="stat-label">Low Stock</div>
          <div class="stat-value">${lowCount}</div>
          <div class="stat-sub">Below ${LOW_THRESHOLD} units</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ${outCount > 0 ? 'red' : 'green'}"><i data-lucide="x-circle"></i></div>
          <div class="stat-label">Out of Stock</div>
          <div class="stat-value">${outCount}</div>
        </div>`;
      lucide.createIcons();
    }

    function formatHours(h) {
      if (h === null) return '';
      if (h < 1) return Math.round(h * 60) + 'min';
      if (h < 24) return h.toFixed(1) + 'h';
      return Math.round(h / 24) + 'd';
    }

    function timeClass(h) {
      if (h === null) return '';
      if (h < 1) return 'time-crit';
      if (h < 3) return 'time-warn';
      return 'time-ok';
    }

    function renderCharts(locations, skus, breakdown) {
      const $charts = document.getElementById('charts');

      if (!locations.length) {
        $charts.innerHTML = '<div class="empty-state"><i data-lucide="map-pin"></i><h3>No locations</h3><p>Add locations in <a href="/pages/setup-locations.html">Setup</a>.</p></div>';
        lucide.createIcons();
        return;
      }

      // Build SKU lookup
      const skuMap = {};
      skus.forEach(s => skuMap[s.id] = s);

      $charts.innerHTML = locations.map(loc => {
        const locData = breakdown[loc.id] || {};
        const entries = Object.entries(locData)
          .map(([skuId, d]) => ({ sku: skuMap[skuId], ...d }))
          .filter(e => e.sku && e.totalSupply > 0);

        if (!entries.length) {
          return `
            <div class="card" style="margin-bottom:16px;">
              <div class="card-title"><i data-lucide="map-pin"></i> ${esc(loc.name)}</div>
              <div class="text-muted text-sm" style="padding:4px 0;">No stock data yet.</div>
            </div>`;
        }

        // Split liters from non-liters
        const nonLiters = entries.filter(e => e.sku.unit !== 'liters');
        const liters = entries.filter(e => e.sku.unit === 'liters');

        // Find max supply for scaling bars
        const allSupply = entries.map(e => e.totalSupply);
        const maxSupply = Math.max(...allSupply, 1);

        function renderBars(items) {
          return items.map(e => {
            const totalPct = Math.max((e.totalSupply / maxSupply) * 100, 2);
            const usedPct = e.totalSupply > 0 ? (e.used / e.totalSupply) * 100 : 0;
            const burnStr = e.burnPerHour > 0 ? e.burnPerHour.toFixed(1) + '/hr' : '—';
            const timeStr = formatHours(e.hoursLeft);
            const timeCls = timeClass(e.hoursLeft);

            let qtyClass = '';
            if (e.current <= 0) qtyClass = 'time-crit';
            else if (e.current < LOW_THRESHOLD) qtyClass = 'time-warn';

            return `
              <div class="stock-bar-row">
                <div class="stock-bar-label">${esc(e.sku.name)}</div>
                <div class="stock-bar-wrap">
                  <div class="stock-bar-total" style="width:${totalPct}%">
                    <div class="stock-bar-used" style="width:${usedPct}%"></div>
                  </div>
                </div>
                <div class="stock-bar-meta">
                  <div class="stock-bar-qty ${qtyClass}">${Math.round(e.current)} <span class="text-xs text-muted">${esc(e.sku.unit)}</span></div>
                  <div class="stock-bar-burn">${burnStr}</div>
                  ${timeStr ? `<div class="stock-bar-timeleft ${timeCls}">${timeStr} left</div>` : ''}
                </div>
              </div>`;
          }).join('');
        }

        let chartHTML = '<div class="stock-chart">';

        if (nonLiters.length && liters.length) {
          // Both sections
          chartHTML += `<div class="chart-section-label">Units</div>`;
          chartHTML += renderBars(nonLiters);
          chartHTML += `<div class="chart-section-label">Liters</div>`;
          chartHTML += renderBars(liters);
        } else if (liters.length) {
          chartHTML += `<div class="chart-section-label">Liters</div>`;
          chartHTML += renderBars(liters);
        } else {
          chartHTML += renderBars(nonLiters);
        }

        chartHTML += '</div>';

        return `
          <div class="card" style="margin-bottom:16px;">
            <div class="card-title"><i data-lucide="map-pin"></i> ${esc(loc.name)}</div>
            ${chartHTML}
          </div>`;
      }).join('');
      lucide.createIcons();
    }

    function renderFeed(movements) {
      const $feed = document.getElementById('feed');
      if (!movements.length) {
        $feed.innerHTML = '<div class="text-muted text-sm" style="padding:12px 0;">No movements yet.</div>';
        return;
      }

      $feed.innerHTML = movements.map(m => {
        const time = new Date(m.moved_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const skuName = m.sku?.name || '?';
        let desc;
        if (m.type === 'transfer') desc = `${m.from_loc?.name || '?'} → ${m.to_loc?.name || '?'}`;
        else if (m.type === 'delivery') desc = `Delivery → ${m.to_loc?.name || '?'}`;
        else desc = `Sale @ ${m.from_loc?.name || '?'}`;

        return `
          <div class="feed-item">
            <div class="feed-dot ${m.type}"></div>
            <div class="feed-main">
              <div class="feed-title">${esc(skuName)}</div>
              <div class="feed-meta">${esc(desc)} · ${time}</div>
            </div>
            <div class="feed-qty">${m.type === 'sale' ? '−' : ''}${m.quantity}</div>
          </div>`;
      }).join('');
    }

    function setupRealtime() {
      sb().channel('overview-movements')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'movements',
          filter: `event_id=eq.${eventId}`,
        }, () => refresh())
        .subscribe();

      sb().channel('overview-counts')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'stock_counts',
          filter: `event_id=eq.${eventId}`,
        }, () => refresh())
        .subscribe();
    }
  </script>
</body>
</html>
